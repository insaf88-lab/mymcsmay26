{mock:'M1',sec:'S1',sub:'1',topic:'Leadership',wt:60,
q:'Leadership challenges and most suitable leadership styles for Cartn\'s Product Design team (following retirement of 18-year experienced leader).',
theory:'<strong>Challenges:</strong><ul><li>Managing highly specialised, independent technical engineers → requires Strong Leadership</li><li>Collaborative nature of Cartn\'s product development → Coordination needed</li><li>Growing importance of sustainability in Cartn\'s strategy → Leader must drive this</li></ul><strong>Leadership Styles:</strong><ul><li>Combine <strong>Authoritative</strong> (strong direction for sustainability and innovation, managing complex teams) with <strong>Participative</strong> (collaborative environment that stimulates innovation — especially for consultancy division)</li></ul>',
answer:'Authoritative style for giving clear direction on Cartn\'s 24.0g CO₂e sustainability targets and managing complex cross-factory projects. Participative style for consultancy division — engineers need collaborative environment to innovate packaging designs. New leader must also bridge gap between Product Development (Wofai Eko\'s department) and the 800 consultancy engineers.'},

{mock:'M1',sec:'S1',sub:'2',topic:'Big Data / BIS',wt:40,
q:'How will a Business Intelligence System (BIS) be used to select the appropriate replacement candidate for Head of Design Engineering?',
theory:'<strong>What is BIS?</strong> A business intelligence system enables organisations to analyse large volumes of operational and financial data to support decision-making.<br><br><strong>Uses of BIS for selection:</strong><ul><li><strong>a.</strong> Analyse efficiency of product development processes → identifies successful innovations</li><li><strong>b.</strong> Identify management practices that contributed to efficient product development → coordinate cross-functional teams</li><li><strong>c.</strong> Analyse manufacturing performance data relating to packaging designs → how compatible designs are with Cartn\'s machine setups (balance innovation with operational efficiency)</li><li><strong>d.</strong> Analyse customer feedback on Cartn\'s packaging products and consultancy services → Customer-focused leadership indicator</li></ul>',
answer:'Use BIS to pull data from Cartn\'s 27 factories and 6 consultancy offices to identify patterns: which engineering approaches led to successful packaging designs, which management styles reduced project overruns, which leaders generated positive customer feedback. This gives objective selection criteria beyond just CV and interview.'},

{mock:'M1',sec:'S2',sub:'1',topic:'Business Models',wt:40,
q:'Identify and evaluate the use of AI in packaging design and development in defining and creating value for Cartn\'s business model.',
theory:'<strong>Defining Value:</strong> Cartn defines value by supplying packaging that enhances perceived quality of food products.<ul><li>AI → respond more quickly to customer requirements</li><li>AI → introduce new packaging designs that reduce production costs</li><li>Risk: customers may perceive a reduction in technical expertise</li></ul><strong>Creating Value:</strong> Cartn creates value through expertise in packaging manufacture and innovative packaging solutions.<ul><li>AI analyses large datasets and simulates product performance → engineers identify solutions faster than trial-and-error</li><li>AI supports sustainability improvements (less material, less energy)</li><li>Risk: remaining staff may lack capacity to manage complex projects or validate AI-generated designs → could slow innovation</li></ul>',
answer:'AI helps Cartn respond faster and reduce costs, which enhances the value proposition for food manufacturer clients. However, the risk is that clients (dairy companies, juice manufacturers) may question whether Cartn\'s consultancy expertise is still genuine — particularly important given Cartn\'s premium positioning vs Valboxx.'},

{mock:'M1',sec:'S2',sub:'2',topic:'Risk',wt:60,
q:'What are the risks of using AI to cover product development activities and the associated redundancies?',
theory:'<ul><li><strong>1. Technological reliability:</strong> AI errors could lead to food poisoning or product recalls — catastrophic for food packaging</li><li><strong>2. Operational transition risks:</strong> Reduction in shelf life of products during transition period</li><li><strong>3. Drop in employee morale:</strong> Existing engineers will not provide their true knowledge if they fear redundancy</li><li><strong>4. Reputational risk:</strong> Customers may ask how to validate packaging quality when AI is making design decisions — undermines Cartn\'s expert positioning</li></ul>',
answer:'The combination of food safety risk (AI error = food poisoning) and reputational risk (clients question expertise) is particularly dangerous for Cartn. Losing internal human capability in a food safety environment is an existential risk — cannot rely on AI alone.'},

{mock:'M1',sec:'S3',sub:'1',topic:'Funding',wt:60,
q:'Identify characteristics of debt and equity and suggest method to fund the AI hub.',
theory:'<strong>Debt:</strong> Cheaper, interest is tax-deductible. Interest cover = 11.38 (massive). PPE H$258.1m available as collateral. Gearing would rise but remains safe.<br><strong>Equity:</strong> No fixed payments (good for risky tech), but expensive and dilutes control.<br><strong>Recommendation: Debt</strong> — Cartn can easily afford it.',
answer:'Given Cartn\'s interest cover of 11.38 and tangible assets of H$258.1m as collateral, debt is clearly the recommendation. The AI hub at H$84m is a large but manageable investment for a company generating H$140m operating profit against only H$12.3m finance costs.'},

{mock:'M1',sec:'S3',sub:'2',topic:'Responsibility Centres',wt:40,
q:'Arguments for and against treating the AI hub as an Investment Centre.',
theory:'<strong>Pros:</strong><ul><li>H$84m is a huge asset → managers should be held accountable for ROI</li><li>Incentivises manager to sell excess computing capacity to third parties → boosts revenue</li></ul><strong>Cons:</strong><ul><li>The facility\'s main benefits are indirect (helping factories and consultancy)</li><li>Making ROI hard to measure → dysfunctional behaviour</li><li>Engineers might over-invest in tech if given capital authority</li><li>Highly integrated operations make a standalone centre difficult</li></ul>',
answer:'Key tension: the AI hub serves all 27 factories and 6 consultancy offices — its value is indirect and shared. Treating it as an investment centre isolates it artificially, risks managers chasing ROI at the expense of sustainability targets (24.0g CO₂e), and creates goal incongruence across Cartn\'s operations.'},

{mock:'M1',sec:'S4',sub:'1',topic:'KPIs',wt:40,
q:'Recommend KPIs to evaluate the Board\'s performance of AI design engineering.',
theory:'<strong>KPI 1:</strong> Number of successfully developed/implemented designs (measures productivity)<br><strong>KPI 2:</strong> Utilisation rate of the AI infrastructure (measures if the expensive H$84m asset is actually being used)<br><em>Each KPI: What it measures, How it is measured, Why it matters (positive and negative implications)</em>',
answer:'Your own answer included: Design Cycle Time, Time Engineers Use the System, ROI, Carbon Emission Rate — these are also valid. Key is linking each KPI back to Cartn\'s strategic goals (quality, sustainability, innovation) and explaining both positive and dysfunctional implications.'},

{mock:'M1',sec:'S4',sub:'2',topic:'Integrated Reporting',wt:60,
q:'Recommend disclosure reasons for Integrated Report: Intellectual Capital, Human Capital, Social & Relationship Capital.',
theory:'<strong>Intellectual:</strong> New AI systems, faster prototyping, enhanced design knowledge<br><strong>Human:</strong> Need for new competencies (data analysis) but also acknowledging reduction in workforce and how Cartn will support/redeploy them<br><strong>Social/Relationship:</strong> Better collaboration with food manufacturing clients, more reliable solutions, potential new partnerships via renting out excess computing capacity',
answer:'IR disclosures must be balanced — don\'t just show the positives. Human Capital must address redundancies honestly. Social Capital must show how Cartn\'s clients benefit from the AI investment. The excess computing capacity rental is a particularly strong point — turns a cost into a revenue stream and builds new relationships.'},

// ─── MOCK 2 ───
{mock:'M2',sec:'S1',sub:'1',topic:'Risk',wt:60,
q:'Evaluate product risk, operational risk, and contractual inadequacy risk for the RePurpose™ packaging technology.',
theory:'<strong>Product Risk:</strong> Customers might not understand difference between recycling and repurposing; tech is unproven (18 months away)<br><strong>Reputation Risk:</strong> Cartn could face backlash for "greenwashing" if AI predictive sustainability models fail in real world<br><strong>Operational Risk:</strong> Engineers need extensive training; customers might struggle to adjust their supply chains<br><strong>Contractual Risk:</strong> Contract with University might lack clear IP ownership definitions → Cartn left with restricted rights',
answer:'The IP ownership risk is particularly critical — if Cartn invests heavily in developing RePurpose™ with a university partner but doesn\'t clearly own the IP, it could lose its competitive advantage overnight. The greenwashing risk also threatens Cartn\'s existing 24.0g CO₂e sustainability credentials.'},

{mock:'M2',sec:'S1',sub:'2',topic:'IAS 38',wt:40,
q:'Recommend actions the Board can ensure costs of acquiring intellectual property are capitalised as intangible assets under IAS 38.',
theory:'IAS 38 criteria Cartn must satisfy:<ul><li><strong>Identifiable:</strong> Contract must legally establish Cartn\'s control over the IP</li><li><strong>Probable future benefits:</strong> Conduct market research to prove probable future economic benefits</li><li><strong>Technical feasibility:</strong> Secure technical assurances from university that 18-month project is feasible</li><li><strong>Cost measured reliably:</strong> Keep strict invoices to measure costs reliably</li></ul>',
answer:'All four IAS 38 criteria must be met simultaneously. The hardest for RePurpose™: technical feasibility (university assurance needed) and probable future benefits (market research into whether food manufacturers will actually adopt). Without both, costs must be expensed immediately — hitting Cartn\'s H$140m operating profit.'},

{mock:'M2',sec:'S2',sub:'1',topic:'Segmenting Customers',wt:40,
q:'How can segmenting Cartn\'s customer base help predict demand for RePurpose™?',
theory:'<ul><li><strong>Sustainability priorities:</strong> Companies with strict environmental targets are more likely to buy</li><li><strong>Technical capability:</strong> Customers with dedicated sustainability teams are better equipped to interpret AI metrics</li><li><strong>Organisational scale:</strong> Large multinational food manufacturers have resources to invest early</li></ul>',
answer:'Cartn\'s dairy clients (UHT milk manufacturers) are likely the best early adopters — they face intense consumer pressure to reduce plastic. Large multinationals with sustainability teams can interpret the AI predictions. Smaller food manufacturers are unlikely early adopters.'},

{mock:'M2',sec:'S2',sub:'2',topic:'Funding',wt:60,
q:'Evaluate suitability of debt to fund the cost of acquiring the patent and associated manufacturing equipment.',
theory:'Key issue: Debt requires immediate interest payments, but the tech won\'t generate revenue for 18 months.<br><br>This creates a cash flow timing mismatch — Cartn will be paying interest from day 1 but won\'t see revenue benefits until month 19+. Contrast with Mock 1 AI hub (which is for existing operations and generates immediate efficiency benefits).',
answer:'Unlike Mock 1 (where debt was clearly recommended), here the 18-month revenue gap makes debt more risky. Equity may be more appropriate for this specific investment despite higher cost — no mandatory interest payments during the development period. The Board must weigh the tax shield of debt against the liquidity pressure of interest payments before any revenue arrives.'},

{mock:'M2',sec:'S3',sub:'1a',topic:'Leadership',wt:40,
q:'Recommend leadership style for the Sales and Consultancy project team introducing RePurpose™ to customers.',
theory:'<strong>Participative/Supportive style</strong><ul><li>Team needs to collaboratively figure out how to explain complex sustainability metrics to clients</li><li>Authoritarian style would pressure staff to rush sales</li><li>Supportive style ensures new product doesn\'t conflict with existing sales bonuses</li></ul>',
answer:'Participative because RePurpose™ is new and complex — the sales team doesn\'t yet have a script. They need space to learn together, understand client objections, and develop their own explanations. An authoritative leader pushing for quick sales would damage client relationships and undermine the premium positioning of RePurpose™.'},

{mock:'M2',sec:'S3',sub:'1b',topic:'Pricing',wt:60,
q:'Recommend pricing strategy for the RePurpose™ packaging solution.',
theory:'<ul><li><strong>Cost-plus:</strong> Too simple — doesn\'t reflect the premium value to sustainability-driven clients</li><li><strong>Penetration:</strong> Undermines the premium sustainable image Cartn wants to build</li><li><strong>Value-based pricing: RECOMMENDED</strong> — Charge high prices to customers who desperately need to hit corporate sustainability targets; offer flexible pricing to others</li></ul>',
answer:'Cartn\'s food manufacturer clients are under immense pressure from regulators and consumers to demonstrate green credentials. They will pay a premium for RePurpose™ because it directly helps them hit sustainability targets. Value-based pricing captures this willingness to pay rather than leaving money on the table with cost-plus.'},

{mock:'M2',sec:'S3',sub:'2a',topic:'Real Options',wt:40,
q:'Evaluate advantages and disadvantages of the proposed real option for Cartn\'s RePurpose™ investment.',
theory:'A real option allows a company to maintain strategic flexibility when the future outcomes of an investment are uncertain.<br><br><strong>Advantage:</strong> Allows Cartn to pause, scale up, or abandon the investment based on how the market responds to RePurpose™<br><strong>Disadvantage:</strong> Real options have a cost; they are difficult to value; waiting may allow competitors to enter first',
answer:'The real option is particularly valuable here because RePurpose™ is unproven technology. Rather than committing fully upfront, Cartn can invest in phases — testing market response with early adopters before rolling out globally across all 27 factories.'},

{mock:'M2',sec:'S3',sub:'2b',topic:'Negotiation',wt:60,
q:'Recommend Cartn\'s approach to negotiating the sale of licences for RePurpose™ to other packaging manufacturers.',
theory:'<ul><li>Analyse competitors to see who values sustainability most → use to set fees</li><li>Negotiate individually rather than in a group → prevents competitors teaming up</li><li>Define strict quality standards to protect Cartn\'s reputation</li><li>Include audit rights to verify royalty payments</li></ul>',
answer:'Cartn\'s leverage: it holds the IP and the technology. By negotiating individually with each competitor (not simultaneously), Cartn prevents rivals from forming a coalition to push prices down. Audit rights are essential — without them, competitors could underreport usage and underpay royalties.'},

// ─── MOCK 3 ───
{mock:'M3',sec:'S1',sub:'1',topic:'Business Models',wt:60,
q:'What changes are required to Cartn\'s business model when supplying packaging to sports clubs and community event organisations?',
theory:'<strong>Business model is changing from traditional large food manufacturer to event-based:</strong><br><br><strong>Define Value:</strong> Events prioritise aesthetics, convenience, affordability, delivery speed — not production efficiency<br><strong>Create Value:</strong> Needs broader technical capability for new food types (sandwiches, cupcakes) and flexibility for smaller, customised runs<br><strong>Deliver Value:</strong> Smaller, irregular orders disrupt long-term scheduling — must reserve capacity for events; lead time = just before event start<br><strong>Capture Value:</strong> Event customers expect flexible, order-by-order pricing rather than long-term structured contracts',

{mock:'M3',sec:'S1',sub:'2',topic:'Risk',wt:40,
q:'Risks of supplying packaging to event organisations.',
theory:'<strong>Product/Reputation Risk:</strong> If Cartn\'s packaging fails for new food types (sandwiches, cakes getting soggy), event organisers will spread negative feedback quickly via social networks → ruins reputation in this new market<br><strong>Operational Risk:</strong> Strict event deadlines mean delays are catastrophic. Irregular, small orders will disrupt highly efficient, predictable production schedules of Cartn\'s main factories.',
answer:'The reputational risk here is amplified by social media — a photo of soggy event packaging goes viral and damages Cartn\'s brand far beyond the events segment. The operational risk is real: diverting factory capacity to small event orders could delay deliveries to core dairy and juice clients, which is far more financially damaging.'},

{mock:'M3',sec:'S2',sub:'1',topic:'Authority',wt:40,

answer:'The key risk is dysfunctional behaviour — a commission-driven sales team will win contracts at any price. This erodes Cartn\'s H$140m operating profit and steals factory capacity from dairy and juice clients who generate far higher margins. Cartn must set minimum price thresholds and delivery feasibility checks.'},

{mock:'M3',sec:'S2',sub:'2',topic:'Teams',wt:60,
q:'Recommend team membership for the event packaging sales team.',

answer:'The Finance Rep is the critical safeguard — they provide the commercial anchor that prevents the sales team from agreeing to unprofitable contracts. The Operations Rep is equally important to ensure promised delivery dates are actually achievable without disrupting core factory schedules.'},

{mock:'M3',sec:'S3',sub:'1',topic:'Quality Management (JIT)',wt:40,
q:'Evaluate adoption of Just-In-Time (JIT) for a large event packaging project.',

answer:'For events, JIT is particularly risky because event dates are fixed and immovable — if packaging doesn\'t arrive before the event, it\'s worthless. The global logistics complexity across Cartn\'s supply network makes this even more dangerous than for standard food manufacturer clients.'},

answer:'Both options have severe NPV cash flow prediction problems. The commission model makes incrementality impossible to prove. The equity model requires valuing an unquoted startup with no history. In both cases, the qualitative strategic benefits (new sales channels, distribution reach) may outweigh the quantifiable NPV.'},

{mock:'M3',sec:'S4',sub:'2',topic:'Group Accounting (IAS 24 / IAS 28)',wt:60,
q:'Accounting treatment for the PCS investment (Related Party under IAS 24 and Associate under IAS 28).',
theory:'<strong>Related Party (IAS 24):</strong> PCS is owned by Lina, wife of Haitham Amer (Marketing Director / Key Management Personnel). PCS is automatically a related party. Cartn must disclose: the relationship, all transactions (commissions), and outstanding balances.<br><br><strong>Associate (IAS 28):</strong> 30% equity > 20% → presumption of Significant Influence. However, Lina retains 70%, so Cartn does NOT have control (not a subsidiary). Equity Method: recorded at cost, adjusted annually for 30% of post-acquisition profits in P&L as a single line item.',
answer:'The Related Party disclosure is mandatory regardless of the equity method accounting. The fact that PCS is owned by the Marketing Director\'s wife creates governance and ethics concerns — Mario Baquero must ensure full disclosure in financial statements and Cartn\'s Board must consider whether this constitutes a conflict of interest requiring independent approval.'},

// ─── MOCK 4 ───
{mock:'M4',sec:'S1',sub:'1',topic:'Pricing',wt:40,
q:'Should Cartn offer a discount for 3-year software subscription contracts?',
theory:'<strong>No discount needed because:</strong><ul><li>Customers benefit from guaranteed operational access</li><li>Protection from future price inflation</li><li>Reduced administrative burden (no annual renewal)</li><li>2-week trial period significantly reduces customer\'s perceived risk</li></ul>Cartn does not need to offer a discounted rate — dairy clients already benefit from price certainty for budgeting.',
answer:'The key insight is that the 3-year contract already provides value to customers (price certainty, no renewal admin) without Cartn giving anything away. The 2-week trial eliminates the risk perception that usually requires a discount to overcome. Cartn\'s pricing power remains intact.'},

{mock:'M4',sec:'S1',sub:'2',topic:'IFRS 15',wt:60,
q:'Accounting treatment for subscription income and advance payments under IFRS 15.',
theory:'<ul><li>Contract only legally binding and creates performance obligations once trial period expires</li><li>Revenue for continuous services (software access) must be recognised <strong>progressively over time</strong> (monthly) as customer consumes the benefit</li><li>Advance payments = <strong>Contract Liabilities</strong> until service is delivered</li><li>Refundable deposits = strictly liabilities (non-current initially, current in final year) — never revenue unless customer breaches contract</li></ul><strong>Cartn:</strong> Recognise 1/12th of annual fee each month. 1-month advance deposit = non-current liability (becoming current in year 3).',
answer:'The 2-week trial period is key to IFRS 15 — the contract is NOT binding during the trial, so Cartn must not recognise any revenue until the trial expires. After trial, revenue recognised monthly (not upfront). The advance deposit sits as a non-current liability for years 1-2 and transfers to current liability in year 3 when refund becomes due.'},

{mock:'M4',sec:'S2',sub:'1',topic:'Business Risks',wt:60,
q:'Evaluate product, reputation, and contractual inadequacy risks of 3-year software contracts.',
theory:'<strong>Product Risk:</strong> Low — 80% of surveyed customers already prefer 3-year contracts<br><strong>Reputation Risk:</strong> Backlash if new sustainability features emerge and locked-in clients can\'t switch. Customers feel trapped.<br><strong>Contractual Inadequacy Risk:</strong> Cartn will struggle to verify if a dairy client\'s "IT infrastructure is genuinely incompatible" or if they simply want to cancel for convenience. Subjective cancellation clauses are practically unenforceable.',
answer:'The contractual inadequacy risk is the most serious. If the cancellation clause relies on IT incompatibility claims that Cartn cannot objectively verify, any dissatisfied client can exit freely. This makes the 3-year contract commercially worthless as a revenue assurance mechanism.'},

{mock:'M4',sec:'S2',sub:'2',topic:'WACC',wt:40,
q:'Impact of 3-year contract uptake on Cartn\'s Weighted Average Cost of Capital (WACC).',
theory:'WACC only changes significantly if:<ul><li>The fundamental business risk profile of the company shifts, OR</li><li>The capital structure (Debt vs Equity) is materially altered</li></ul>Formalising existing customer habits without requiring new capital expenditure leaves WACC largely unchanged.<br><br><strong>Cartn:</strong> Offering 3-year software contracts doesn\'t change core industry risk profile. Board explicitly refused to invest in new servers. No new debt or equity required → WACC does not change materially.',
answer:'This is a trap question — students may assume any revenue change affects WACC. It doesn\'t. WACC reflects the risk-return profile of the entire business, not individual contracts. The 3-year contracts are just formalising existing customer behaviour with no capital investment required.'},

{mock:'M4',sec:'S3',sub:'1',topic:'Project Teams',wt:60,
q:'Separate project teams vs. a single cross-functional team for implementing 3-year software contracts.',
theory:'<strong>Separate teams:</strong><ul><li>Pro: Highly specialised expertise (legal drafting vs marketing psychology); faster parallel working</li><li>Con: Severe misalignment risk — marketing may overpromise features that legal hasn\'t drafted into the contract</li></ul><strong>Single team:</strong><ul><li>Pro: Strategic alignment, reduces complexity</li><li>Con: Slower, requires broad skill set in one group</li></ul><strong>Cartn:</strong> Marketing might promise 24/7 priority support while legal only drafts 9-to-5 terms → misleading marketing. Single team with Alison Cruikshank + Haitham Amer would prevent this.',
answer:'The misalignment risk is the critical argument for a single team. Cartn\'s consultancy reputation is built on technical accuracy and delivering on promises. A separate marketing team making commitments that the legal team hasn\'t approved exposes Cartn to contractual inadequacy and reputational damage with its dairy and juice clients.'},

{mock:'M4',sec:'S3',sub:'2',topic:'Target Costing',wt:40,
q:'Challenges of using target costing for new software subscription benefits (e.g. priority support, interface customisation).',
theory:'Target costing: market price − desired profit margin = target cost. Challenge when adding unproven service benefits because:<ul><li>Estimating unpredictable internal operating costs is difficult</li><li>If customers over-utilise benefits, operational costs breach the target cost allowance and destroy profit margin</li></ul><strong>Cartn:</strong> Subscription price fixed at H$9,400. Priority support (H$100–H$300) or customisation eats directly into existing profit margin. If a packaging client constantly triggers 24-hour priority support, Cartn will have to hire expensive additional IT staff → breaks target cost.',
answer:'The core challenge: target costing assumes you know the cost structure. For unproven service benefits, usage rates are completely unpredictable. One high-maintenance client could make the entire product line unprofitable.'},

{mock:'M4',sec:'S4',sub:'1',topic:'Negotiation',wt:60,
q:'Negotiation approach with frustrated customer whose access was disrupted by a hacking incident.',
theory:'<ul><li>Verify strict legal rights first — but don\'t rely purely on them</li><li>Cooperative approach: acknowledge frustration, explain rationale transparently (cybersecurity threat), explore mutually beneficial compromises (rotating access)</li></ul><strong>Cartn:</strong> Legally safe — contracts explicitly allowed cancellations without liability if hosting capacity failed. BUT Daniel Navarro\'s dairy group has 20 subsidiaries → being rigid could lose massive packaging manufacturing contracts across the dairy sector. Cooperatively explain hacking threat and explore rotating-access or server expansion.',
answer:'The legal vs commercial tension is the key insight. Cartn is legally protected but commercially vulnerable. Losing Navarro\'s 20 subsidiaries from the physical carton manufacturing business (which generates far more revenue than the software subscription) would be catastrophic. The cooperative approach protects both.'},

{mock:'M4',sec:'S4',sub:'2',topic:'NPV',wt:40,
q:'Difficulties estimating cash flows for NPV of rotating-access solution.',
theory:'<ul><li>Unpredictable admin IT costs (constantly monitoring and toggling software permissions for 20 subsidiaries)</li><li>Revenue forecasts highly uncertain — dissatisfied customers might cancel entirely</li><li>Reputational damage might spill over to other divisions</li></ul><strong>Cartn:</strong> Admin IT costs fluctuate constantly when switching software profiles for 20 subsidiaries. Hard to estimate software revenue lost if clients refuse rotating access. Even harder to estimate how much physical carton manufacturing revenue is lost if frustrated clients switch to Valboxx.',
answer:'The cross-divisional spillover is the hardest cash flow to estimate — if Navarro\'s group abandons Cartn entirely (switching carton orders to Valboxx), the revenue impact dwarfs the software subscription loss. Traditional NPV analysis rarely captures these interdependencies.'},

// ─── MOCK 5 ───
{mock:'M5',sec:'S1',sub:'1',topic:'Business Models',wt:40,
q:'Implications of divestment of integration operations for defining and capturing residual value.',
theory:'<strong>Defining Value:</strong> Shifts from direct hands-on operational insights to "network model" — parent provides strategic standards, franchisees deliver local implementation. Risk of losing consultancy credibility if clients feel expertise now sits with external franchisees.<br><br><strong>Capturing Value:</strong> Direct operating profits → asset-light franchise fee income. Residual value still captured via synergy (franchisees keep clients loyal → sustained bulk carton orders).',
answer:'Cartn currently sends its own technical staff to help dairy clients integrate cartons into filling machines. Post-divestment, it shifts to receiving upfront franchise fees and ongoing royalties. The critical risk: if franchisees fail to maintain Cartn\'s quality standards, clients abandon Cartn\'s physical cartons too — destroying both revenue streams.'},

{mock:'M5',sec:'S1',sub:'2',topic:'Performance',wt:60,
q:'Implications of performance improving when operations are franchised.',
theory:'<ul><li>Improved performance implies current centrally-owned structure lacks sharp commercial incentives of a principal who has invested personal capital</li><li>Franchisees are more locally responsive without distraction from parent\'s wider strategic priorities</li><li>BUT: some "low" performance was intentional — e.g., pricing services cheaply to encourage trials of new products</li><li>Parent must maintain strong performance monitoring without imposing overly rigid central control</li></ul>',
answer:'The critical nuance: Cartn may have intentionally underpriced integration services to secure massive long-term carton contracts. If franchisees now charge commercial rates and clients react badly, Cartn could lose both the integration revenue AND the core carton manufacturing contracts. Performance improvement must be interpreted carefully before celebrating.'},

{mock:'M5',sec:'S2',sub:'1',topic:'Benchmarking',wt:60,
q:'Approach to benchmarking the 40 newly divested integration franchises.',
theory:'<strong>Dual approach required:</strong><ul><li>Benchmark vs each other (newly divested cohort) → tracks short-term transition progress (same starting conditions)</li><li>Benchmark vs mature existing franchise network → shows long-term sustainable profitability</li></ul><strong>Crucial:</strong> Anonymise data to protect commercial secrets of independent operators. Track quality metrics (customer retention, successful aseptic packaging implementation) not just revenue.',
answer:'Mario Baquero should present anonymised comparative data to the 40 new franchise principals. Showing them what established franchisees achieve gives them a credible performance target. However, anonymisation is non-negotiable — revealing which specific franchisee is outperforming creates toxic competition rather than collaboration.'},

{mock:'M5',sec:'S2',sub:'2',topic:'Pricing',wt:40,
q:'Challenges faced by franchise principals in setting service prices (ratchet effect).',
theory:'<strong>Ratchet Effect & Historical Subsidies:</strong> Cartn intentionally underpriced integration services to drive core carton sales. When franchisees suddenly raise prices to commercial rates, customers feel overcharged → relationships damaged.<br><br><strong>Technical Complexity & Time Lags:</strong> Customers struggle to value complex technical integration. May accept higher prices initially due to urgency, but quietly seek alternatives later — dangerous time lag before franchisee realises demand is falling.',
answer:'Cartn historically charged dairy clients very low integration fees just to secure long-term carton contracts. Franchisees raising those prices will shock clients who have been effectively subsidised for years. The time lag is particularly dangerous — clients won\'t complain, they\'ll just quietly switch to Valboxx\'s equivalent service when their next contract comes up for renewal.'},

{mock:'M5',sec:'S3',sub:'1',topic:'Negotiation',wt:60,
q:'Issues likely to be discussed when negotiating selling prices for the 40 divested operations.',
theory:'<ul><li><strong>Buyer\'s Alternative:</strong> Buyers argue they could set up a rival facility from scratch rather than paying a premium</li><li><strong>Valuation of Intangibles vs Leased Assets:</strong> Physical assets are leased → negotiation centres on hard-to-value intangibles (customer loyalty, trained staff). Buyers question if customers/engineers will actually stay post-transfer</li><li><strong>Future Cost Structure:</strong> Buyers argue selling price must be lower because future profits suppressed by royalty obligations to parent company</li></ul>',
answer:'Cartn\'s negotiating challenge: the 40 operations have no owned physical assets (facilities are leased), so the entire value is intangible — customer relationships and engineer expertise that could walk out the door on day 1. Buyers will aggressively discount these intangibles, making Cartn\'s asking price very hard to justify.'},

{mock:'M5',sec:'S3',sub:'2',topic:'ROCE',wt:40,
q:'Limitations of using ROCE to negotiate selling prices for the divested operations.',
theory:'<ul><li><strong>Historical vs Future:</strong> ROCE is historical and doesn\'t reflect future maintainable profit (doesn\'t include new franchise royalties)</li><li><strong>Book Values Distort Reality:</strong> Depreciated book values shrink the denominator artificially → ROCE looks incredibly high and misleads buyer about true asset value</li><li><strong>Ignores Intangibles & Cash Flow:</strong> ROCE ignores internally generated goodwill, staff expertise, and future working capital requirements</li></ul>',
answer:'Barbara Wolnik\'s ROCE figures are misleading because: (1) heavily depreciated machinery makes Capital Employed artificially small, inflating ROCE; (2) future royalty payments to Cartn are not reflected in historical ROCE; (3) the value of client relationships — the most important asset in these operations — is completely invisible in ROCE.'},

{mock:'M5',sec:'S4',sub:'1',topic:'Risk',wt:40,
q:'Product reputation and contractual inadequacy risks of divesting the 40 integration operations.',
theory:'<strong>Product Reputation Risk:</strong> Franchisees are profit-driven, may cut costs (reducing engineers/training). If calibration fails → food poisoning → public blames Cartn\'s packaging brand, not the franchisee.<br><br><strong>Contractual Inadequacy Risk:</strong> Buyers may sue post-sale if revenues fall short of projections, or argue that expiring customer contracts were hidden during due diligence. Vague handover responsibilities → costly legal disputes.',
answer:'The food safety risk is existential for Cartn — a single case of food poisoning linked to a faulty aseptic filling machine (even operated by an independent franchisee) will destroy Cartn\'s reputation in the dairy and juice sectors. The contractual risk is also severe: if Mario Baquero exaggerated revenue projections, buyers have grounds to sue for misrepresentation.'},

{mock:'M5',sec:'S4',sub:'2',topic:'Funding',wt:60,
q:'Characteristics of debt that make it beneficial to use the H$20m franchise sale proceeds for debt repayment.',
theory:'<ul><li><strong>Gearing & Risk Profile:</strong> Repaying debt lowers gearing ratio → financially safer, improves creditworthiness, provides flexibility for future strategic borrowing at lower rates</li><li><strong>Fixed Obligations:</strong> Debt carries mandatory fixed interest regardless of profitability → removing this reduces earnings volatility</li><li><strong>Opportunity Cost:</strong> Cash in bank earns lower rate than cost of servicing long-term debt → repaying debt is more efficient use of idle capital</li></ul><strong>Cartn:</strong> H$20m repayment drops gearing from 28.5% to 25.8%. Saves approx 8% annually on that H$20m. Avoids opportunity cost of idle cash.',
answer:'Cartn already has excellent interest cover (11.38) and low gearing (28.5%), so the financial safety argument is moderate. The strongest argument is the opportunity cost — cash in Cartn\'s bank earns minimal interest while the existing loans carry an ~8% cost. Repaying debt is simply the most efficient use of the H$20m.'},

// ─── CIMA MOCK A ───
{mock:'MA',sec:'S1',sub:'1',topic:'Business Models',wt:40,
q:'Should Cartn redefine value to include end consumers (B2B2C model) — in context of Harrlandian TV documentary about BioPack?',
theory:'<strong>B2B2C principle:</strong> Even in a B2B model, the ultimate driver of demand is the end consumer. If end consumers reject a product due to quality/safety concerns, B2B customers immediately stop ordering.<br><br>Redefining value to include consumer satisfaction, safety and environmental peace of mind builds trust and proactively solves problems for B2B clients.',
answer:'Cartn\'s current model defines value for food manufacturers (B2B). But the TV documentary targets Harrlandian consumers directly. If consumers believe UHT milk "tastes off" or BioPack degrades in their fridge, dairy clients (Cartn\'s actual customers) will stop buying Cartn\'s packaging. Cartn must redefine value to protect its clients\' brand reputation.'},

{mock:'MA',sec:'S1',sub:'2',topic:'Risk',wt:60,
q:'Impact of three major business risks of BioPack and recommendations to address them.',
theory:'<strong>Product Risk:</strong> BioPack degrades too soon or taints food → mass spoilage, costly recalls. Mitigation: Strict QC testing in real-world conditions; define maximum shelf-life parameters.<br><strong>Reputational Risk:</strong> Severe PR disaster from documentary; greenwashing accusations if energy usage remains high. Mitigation: Transparent communication, publish independent lab results, invest in energy-efficient machinery rapidly.<br><strong>Operational Risk:</strong> Scaling unproven high-temperature process strains factory capacity, disrupts profitable standard products. Mitigation: Isolate production in dedicated pilot facility or separate matrix team.',
answer:'The operational risk is particularly relevant to Cartn\'s 27 standard factories — forcing them to run high-temperature sugarcane processes disrupts the highly profitable UHT milk carton production that represents the bulk of Cartn\'s H$1,236m revenue. An isolated pilot facility protects core operations while the new process is proven.'},

{mock:'MA',sec:'S2',sub:'1',topic:'Teams',wt:40,
q:'Evaluate whether Wofai Eko\'s Product Development team acted appropriately with BioPack.',
theory:'<strong>No — two key failures:</strong><br><strong>1. Goal Congruence:</strong> R&D team must align with broader strategic goals (24.0g CO₂e sustainability target), not just execute a technical brief. Accepting massive energy consumption contradicts Cartn\'s core strategy.<br><strong>2. Risk Communication:</strong> Dismissing "taste" and "longevity" issues as subjective, without warning the Board, shows poor risk management. Should have reported to Sustainability Committee before external media discovered them.',
answer:'Wofai\'s technical defence (they created a sugarcane tub as briefed) fails because the brief was never just about the physical product — it was about advancing Cartn\'s sustainability credentials. A product that uses more energy than conventional manufacturing cannot be presented as a sustainability achievement.'},

{mock:'MA',sec:'S2',sub:'2',topic:'IAS 38',wt:60,
q:'Is it appropriate to continue capitalising H$26m BioPack development costs under IAS 38? What are the implications?',
theory:'<strong>IAS 38 criteria must be continuously met:</strong><ul><li>Technical feasibility ✓</li><li>Intention/ability to complete and sell ✓</li><li>Availability of resources ✓</li><li>Probable future economic benefits ← THIS IS NOW IN DOUBT</li></ul>If TV documentary destroys market demand or technical flaws prove unfixable → impairment review required → asset written off to P&L immediately.',
answer:'Mario Baquero must now perform an impairment review. If the documentary causes dairy clients to boycott BioPack, the H$26m no longer generates probable future cash flows. Writing it off would reduce Cartn\'s H$140m operating profit by up to 19% in one year — a devastating impact on current year financials and investor confidence.'},

{mock:'MA',sec:'S3',sub:'1',topic:'Project Management',wt:40,
q:'Difficulties planning the marketing project (2-month deadline before documentary airs) and recommendations.',
theory:'<strong>Difficulties:</strong><ul><li>Extreme time pressure — hard deadline before broadcast</li><li>Intense cross-functional coordination (technical data from R&D, budgets from Finance, messaging from Marketing)</li><li>High risk of making legally inaccurate claims under pressure</li></ul><strong>Recommendations:</strong> Appoint strong senior project manager. Form tight empowered cross-functional team (all key departments including legal experts). Ensure message is scientifically accurate, legally defensible, delivered rapidly.',
answer:'Cartn faces exactly 2 months — the same scenario as the Piping Beverages past paper question. The cross-functional team must include Wofai Eko\'s R&D team (for accurate degradation data), Haitham Amer\'s Marketing team (for message), and Mario Baquero\'s Legal Affairs team (to approve all public ads without making false sustainability claims).'},

{mock:'MA',sec:'S3',sub:'2',topic:'IRR',wt:60,
q:'Use of IRR, the 12% hurdle rate, and other appraisal issues for the advertising campaign.',
theory:'<strong>IRR limitations:</strong><ul><li>Cash flows for defensive campaigns are highly subjective — impossible to isolate incremental revenue vs revenue "saved"</li><li>IRR ignores absolute scale/size of project</li></ul><strong>Hurdle rate issue:</strong> Comparing 15% IRR to 12% hurdle rate is flawed. The 12% likely reflects standard asset-backed manufacturing investments. A highly uncertain marketing campaign demands a risk-adjusted (higher) hurdle rate.<br><strong>Other issues:</strong> Qualitative factors (brand reputation, employee morale, long-term B2B relationships) must be considered even if financials look marginal.',
answer:'Mario Baquero should demand a higher hurdle rate than 12% (e.g., 16%) for this campaign given the uncertainty. The 12% rate is calibrated for buying new carton-folding machines — not for speculative PR defence campaigns. Qualitative factors: stopping Valboxx from stealing frightened dairy clients must ultimately drive the decision, not just the 15% IRR.'},

{mock:'MA',sec:'S4',sub:'1',topic:'Pricing',wt:40,
q:'How can Cartn achieve a higher price for BioPack? Consider alternative pricing approaches.',
theory:'<ul><li><strong>Premium feasible</strong> if target market values sustainability highly and can pass cost to end consumers</li><li><strong>Price Skimming:</strong> High initial price to recover R&D/machinery investment, then gradually lower</li><li><strong>Penetration:</strong> Low initial price to secure market share and block competitors</li><li><strong>Bundling:</strong> High price but offer free supplementary services to increase perceived value</li></ul><strong>Cartn:</strong> Premium because dairy manufacturers want green credentials. Price Skimming to recover expensive new sugarcane machinery. Bundled Pricing by offering free integration consultancy from 800 engineers.',
answer:'The bundled pricing option is particularly powerful for Cartn — it combines the premium packaging price with Cartn\'s existing consultancy expertise (the 800 engineers) in a single offering. This differentiates from Valboxx who has no consultancy division and cannot offer the same bundle.'},

{mock:'MA',sec:'S4',sub:'2',topic:'Sustainability',wt:60,
q:'Recommended disclosures in Cartn\'s sustainability report for BioPack.',
theory:'<strong>Natural Capital:</strong> Disclose positive environmental impacts — reduction in CO₂e per unit, shift away from fossil-based materials to renewable alternatives.<br><strong>Intellectual/Social Capital:</strong> Educate stakeholders on distinction between true biodegradability and limitations of current recycling/repurposing methods → positions Cartn as thought leader.<br><strong>Human Capital & Governance:</strong> Acknowledge internal efforts, Board oversight, and cross-functional teams that drove innovation → demonstrates embedded sustainability culture.',
answer:'Most critically, Cartn must disclose the reduction in its 24.0g CO₂e metric achieved by the new sugarcane machinery (Natural Capital). It must also educate the market on why BioPack\'s 100% biodegradability is superior to the complex, often-failed process of separating and recycling traditional laminated cartons — directly neutralising the TV documentary\'s criticism.'},

// ─── CIMA MOCK B ───
{mock:'MB',sec:'S1',sub:'1',topic:'NPV / Cost Prediction',wt:60,
q:'Challenges predicting costs and revenues for Cartn\'s new wheat straw tray range.',
theory:'<strong>Cost Prediction:</strong><ul><li>Estimating capex for completely new technology is highly uncertain — lacks historical supplier relationships and bargaining power for wheat straw</li><li>Opportunity costs (lost production time on existing profitable lines) notoriously hard to quantify</li></ul><strong>Revenue Prediction:</strong><ul><li>Unpredictable consumer trends (sustainability shifts)</li><li>Risk of cannibalization — new trays may simply erode existing tub sales rather than capture new market share</li></ul>',
answer:'Cartn\'s H$35m setup cost estimate for new wheat straw moulding machines and H$10m for inventory is highly uncertain — Cartn has never bought wheat straw at scale and has no supplier bargaining power. The cannibalization risk is real: dairy clients might switch their yoghurt packaging from Cartn\'s existing tubs to the new trays, generating no net new revenue.'},

{mock:'MB',sec:'S1',sub:'2',topic:'Benchmarking / Segmental Analysis',wt:40,
q:'Usefulness and limitations of Pack-Up\'s segmental analysis for predicting Cartn\'s tray market opportunity.',
theory:'<strong>Useful:</strong> Competitor segmental analysis provides hard evidence of market viability, demand trends, potential profit margins. Justifies large capital investments.<br><strong>Limited:</strong><ul><li>Purely historical and quantitative — shows margins improved but not why</li><li>Ignores qualitative differences (Pack-Up has no consultancy arm; different cost structure)</li></ul><strong>Cartn:</strong> Pack-Up\'s tray revenue grew from H$35.5m (15.3%) to H$57.4m (21.8%), gross margin nearly doubled from 13.7% to 26.8%.',
answer:'Pack-Up\'s data is genuinely useful — it proves the Harrland tray market is growing and profitable. However, Cartn cannot simply replicate Pack-Up\'s margins. Pack-Up is a pure manufacturer; Cartn\'s 800-engineer consultancy arm creates different cost structures and potential synergistic revenue streams that Pack-Up doesn\'t have.'},

{mock:'MB',sec:'S2',sub:'1',topic:'Teams / Leadership',wt:60,
q:'How to improve Wofai Eko\'s Product Development team\'s engagement with the new wheat straw tray project.',
theory:'<ul><li><strong>Team Management & Change:</strong> Management must proactively unfreeze old habits, communicate strategic necessity, empower the team</li><li><strong>Cross-Functional Alignment:</strong> Shift to matrix structure integrating Larisa Nikitina\'s Production staff directly into the design phase — ensures technical designs are actually viable for mass production</li><li>Use <strong>transformational leadership</strong> to help 800 engineers embrace eco-friendly trays</li></ul>',
answer:'Wofai\'s team is comfortable with cartons and tubs — the wheat straw tray is outside their experience. Integrating Larisa Nikitina\'s Production staff directly into the design phase is crucial — it ensures the new trays can actually run on Cartn\'s existing machinery without jamming, breaking down the "that\'s not my problem" departmental silo.'},

{mock:'MB',sec:'S2',sub:'2',topic:'Transfer Pricing',wt:40,
q:'Challenges setting a transfer price for Production staff time when supporting the tray design project, and solutions.',
theory:'<strong>Challenge:</strong> Setting transfer price on basic salary costs creates dysfunctional behaviour — supplying department loses capacity to meet own targets, leading to resentment and refusal to cooperate.<br><strong>Solution:</strong> Transfer price must incorporate opportunity cost of lost production time. Options:<ul><li>Negotiated transfer price covering salary + premium for lost efficiency</li><li>Cost-plus markup that ensures supplying department\'s KPIs are not unfairly penalised</li></ul>',
answer:'Larisa Nikitina is ordered to help Wofai\'s team but only allowed to charge basic salary costs. This makes her miss her strict production cost targets — causing the dysfunctional behaviour of ignoring tray project requests. Mario Baquero must implement a negotiated transfer price that includes an opportunity cost premium (e.g., overtime rate), ensuring Production is fairly compensated.'},

{mock:'MB',sec:'S3',sub:'1',topic:'Funding',wt:40,
q:'Factors relevant to choosing debt vs equity financing for H$45m wheat straw tray investment.',
theory:'<strong>Debt:</strong> Low issuance costs, tax shield on interest, no ownership dilution, requires physical collateral.<br><strong>Equity:</strong> No mandatory cash outflows, safer for uncertain ventures, but expensive, no tax relief, dilutes ownership.<br><br><strong>Cartn supports Debt:</strong> H$140m operating profit vs H$12.3m finance costs = excellent interest cover. H$45m new debt → gearing rises from 28.5% to ~34% — still healthy. H$258.1m PPE as collateral.',
answer:'Debt is clearly appropriate for this capital expenditure — Cartn has the interest cover, the collateral (H$258.1m PPE), and the gearing headroom. The wheat straw moulding machines themselves become additional collateral. Equity would be unnecessarily expensive and dilutive for this type of investment.'},

{mock:'MB',sec:'S3',sub:'2',topic:'Integrated Reporting',wt:60,
q:'Impact of the wheat straw tray range on Cartn\'s Integrated Report six capitals.',
theory:'<ul><li><strong>Financial:</strong> New revenue stream, reduces reliance on milk cartons</li><li><strong>Manufactured:</strong> H$35m investment in bespoke moulding equipment</li><li><strong>Intellectual:</strong> Wofai\'s team gains new expertise + potential patents from wheat straw manipulation</li><li><strong>Human:</strong> 23,000 factory workers + 800 consultants gain new skills</li><li><strong>Social:</strong> Reduces secondary packaging → builds trust with consumer lobby groups petitioning Harrland government</li><li><strong>Natural:</strong> Shifting from fossil-plastics to agricultural waste → boosts sustainability metrics</li></ul>',
answer:'The Natural Capital impact is potentially the most significant from a market positioning perspective — wheat straw is agricultural waste that would otherwise be burned or landfilled. Using it for food packaging packaging creates a genuinely compelling environmental story that directly addresses the greenwashing accusations Cartn faces.'},

{mock:'PP',sec:'2023',sub:'1',topic:'Business Model',wt:60,
q:'[Past Paper Theme] Evaluate if a new proposal or product line is consistent with the company\'s business model.',
theory:'<strong>Framework:</strong><br><strong>Defining Value:</strong> How does company currently define value? Does new proposal meet existing customer expectations or target completely new demographic?<br><strong>Creating Value:</strong> Does company have existing expertise, technology, vertical integration? Or forced to rely on unproven third-party suppliers?<br><strong>Delivering Value:</strong> Can existing sales channels and distribution networks be used? Or entirely new delivery infrastructure required?<br><strong>Capturing Residual Value:</strong> Will new proposal maintain profit margins? Risk of cannibalization from existing profitable products?',
answer:'If Cartn considers cosmetics packaging: Defining Value changes from food safety to luxury aesthetics; Creating Value is disrupted (27 factories built for aseptic bonding, not cosmetics); Delivering Value shifts away from food-industry consultancy synergy. This would contradict the business model. Any new proposal must be tested against all four elements simultaneously.'},

{mock:'PP',sec:'2023',sub:'2',topic:'NPV Difficulties',wt:60,
q:'[Past Paper Theme] Identify difficulties in predicting cash flows for an NPV calculation of a new project.',
theory:'<ul><li><strong>Demand Uncertainty:</strong> No historical sales data for brand-new service/product</li><li><strong>Cost Estimation:</strong> Capex overruns, volatile raw material prices, specialist staff costs</li><li><strong>Incremental Impact:</strong> Nearly impossible to isolate new cash flows from existing operations</li><li><strong>External/Macro Factors:</strong> Competitor reactions, government regulations, economic downturns</li></ul>',
answer:'For Cartn: predicting adoption rates by dairy/juice clients for new packaging, forecasting volatile aluminium/polyethylene costs, estimating how much incremental profit the new tech generates vs standard consultancy sales. The incremental impact problem is particularly acute when Cartn already has established relationships with the same clients.'},

{mock:'PP',sec:'2023',sub:'3',topic:'IFRS / Ratios',wt:60,
q:'[Past Paper Theme] Accounting treatment for project expenditures (IAS 38, IAS 37, IFRS 16) and impact on ratios.',
theory:'<ul><li><strong>IAS 38:</strong> Capitalise development costs only if: technical feasibility + intention to complete + probable future economic benefits + reliable cost measurement</li><li><strong>IFRS 16:</strong> Right-of-use asset + lease liability recognised — increases gearing, decreases current ratio</li><li><strong>IAS 37:</strong> Provision if present obligation + probable cash outflow + reliable estimate</li></ul><strong>Ratio impacts:</strong> Capitalising costs delays expense recognition (inflates short-term operating profit). Recognising new liabilities worsens gearing and current ratio.',
answer:'For Cartn: if R&D develops new recyclable paperboard (IAS 38) — capitalise once commercial viability proven; amortisation reduces long-term ROCE. If Cartn faces a lawsuit for faulty aseptic seal causing food poisoning (IAS 37) — provision required, worsens liquidity ratios. IFRS 16 factory leases add ROU assets and lease liabilities to balance sheet.'},

{mock:'PP',sec:'2024',sub:'1',topic:'Pricing / Controllability',wt:60,
q:'[Past Paper Theme] Pricing new products; controllability principle in performance evaluation; survey reliability.',
theory:'<ul><li><strong>Controllability:</strong> Managers should only be held accountable for costs/revenues within their control — not external factors like global aluminium price spikes or currency movements</li><li><strong>Survey reliability issues:</strong> Non-response bias (only angry/highly interested people reply); customers claim premium willingness in surveys but negotiate cheap in real contracts; voluntary surveys are skewed</li><li><strong>Pricing difficulty:</strong> First-to-market products have no benchmarks; penetration pricing for new sustainable packaging destroys premium image</li></ul>',
answer:'Alison Cruikshank should not be penalised for factory overruns due to uncontrollable global aluminium price spikes. Surveying dairy clients about paying 50% more for recyclable cartons is unreliable — they want to appear green on paper but will negotiate for cheap prices in actual contract negotiations. Cartn must use objective market data, not survey results, for pricing decisions.'},

{mock:'PP',sec:'2025',sub:'1',topic:'Ratchet Effect / BIS',wt:60,
q:'[Past Paper Theme] Ratchet effect in pricing; BIS for social media analysis; business model adaptation for divestments.',
theory:'<strong>Ratchet Effect:</strong> Raising prices is highly risky. Unhappy customers simply leave for a competitor without complaining. Almost impossible to reverse damage by lowering prices later — no efficient way to communicate price drop to departed customers.<br><br><strong>BIS for social media:</strong> Extracts unstructured data (text) to create comparative satisfaction scores vs rivals. Identifies specific keywords related to service failures (e.g., "waiting time", "rude") to pinpoint local weaknesses that standard financial KPIs miss.',
answer:'For Cartn: if it raises prices for standard cartons above what dairy clients will accept, they switch to Valboxx and won\'t come back even if Cartn later reverses the price increase — the relationship has been permanently damaged. BIS could scrape social media for consumer complaints about leaking fruit juice cartons to identify specific factory defects before they become a major quality incident.'},
,

{mock:'P2',sec:'T1',sub:'1',topic:'NPV',wt:0,
q:'P2-T1: What are the potential difficulties in calculating the NPV of acquiring SwiftDeliver Logistics Ltd. (SDL) and how would this acquisition impact Cartn?',
theory:'<strong>Core theory:</strong> NPV requires accurate forecasting of future cash inflows and outflows. Calculations become unreliable when:<ul><li>Benefits are qualitative (improved brand image, better satisfaction) — nearly impossible to convert to cash inflows</li><li>Investing outside core competency introduces unfamiliar cost variables (vehicle depreciation, fuel prices, driver scheduling)</li></ul>',
answer:'<strong>The deal:</strong> Cartn offered H$6m; SDL owner demands H$9m. Benefits (fewer delivery disputes, careful packaging handling) are qualitative and hard to quantify financially. Risks: (1) Underutilisation — idle fleet during quiet periods; (2) Tech evolution — fixed fleet may be a mistake as 3rd-party delivery tech evolves rapidly; (3) Integration — merging delivery-focused workforce with manufacturing culture is complex. <strong>Strategy:</strong> Propose a phased approach — strategic partnership or exclusive trial delivery contract first.'},

{mock:'P2',sec:'T2',sub:'2',topic:'Responsibility Centre',wt:0,
q:'P2-T2: Evaluate whether CreditEase Factors Ltd. should be operated as a cost centre and the challenges of managing it this way.',
theory:'<strong>Cost centre:</strong> Management held accountable strictly for controlling costs, not for generating independent revenue or profit. <strong>Risk:</strong> When performance measured solely on cost reduction, managers may cut service quality to damage long-term customer relationships.',
answer:'<strong>The deal:</strong> Cartn buying 80% stake in CreditEase for H$8.5m to bring debt collection in-house. Challenge: if Finance pressures CreditEase to minimise costs, managers cut training → aggressive debt collection → ruins customer-focused reputation. <strong>Autonomy risk:</strong> Owner demands CreditEase retain full operational autonomy — may reject credit for clients Cartn\'s sales team already approved. <strong>Solution:</strong> Non-financial metrics — communication tone, invoice accuracy, collection turnaround time. Strict reporting and auditing standards.'},

{mock:'P2',sec:'T3',sub:'3',topic:'Value Chain',wt:0,
q:'P2-T3: How would introducing reverse logistics for packaging waste collection complicate Cartn\'s inbound and outbound logistics? How can these be optimised?',
theory:'<strong>Value Chain:</strong> Sequence of activities to create and deliver value. <strong>Inbound Logistics:</strong> Receiving/storing raw materials. <strong>Outbound Logistics:</strong> Distributing finished product. <strong>Reverse Logistics:</strong> Collecting used products from customers for recycling/disposal.',
answer:'<strong>Inbound impact:</strong> Cartn must now audit suppliers for sustainability (not just price) → disrupts long-standing relationships. Optimise: mandate environmental disclosure, enforce recyclable inbound packaging, prioritise local sourcing. <strong>Outbound impact:</strong> Reverse logistics is complex — coordinate with recycling partners, find dedicated storage for waste, track carbon footprint of couriers. Optimise: collect waste on same trip as delivering new packaging, switch to low-emission/electric fleets. <strong>Strategic value:</strong> Turns reputational risk into competitive advantage — differentiates Cartn from Valboxx.'},

{mock:'P2',sec:'T4',sub:'4',topic:'CGMA Cost Transformation',wt:0,
q:'P2-T4: Evaluate how the CGMA Cost Transformation Model could improve cost management at Cartn\'s Middcity manufacturing and quality control operations.',
theory:'<strong>CGMA Cost Transformation Model — 4 pillars:</strong><ul><li>Connecting products with profitability</li><li>Understanding the true drivers of costs</li><li>Fostering a cost-conscious culture across the workforce</li><li>Generating maximum value through operational efficiency</li></ul>',
answer:'<strong>Problem:</strong> Middcity factory has rising costs from: idle machines left running, material wastage (scrapping instead of rechecking), inefficient workflows (batches moved back and forth repeatedly). <strong>Apply model:</strong> (1) Track manufacturing/QC costs per product category — structured recheck process for discarded materials; (2) True cost drivers = idle machinery and poor layout → install automatic power controls, consolidate workstations; (3) Employee reward programme for floor staff to submit energy-saving ideas; (4) Train staff to use automated systems already installed — use digital tracking to streamline product flow.'},

{mock:'P2',sec:'T5',sub:'5',topic:'Cash Flows',wt:0,
q:'P2-T5: How will customers suddenly returning used packaging directly to Cartn affect cash flow projections and investment appraisals?',
theory:'<strong>Working Capital Pressure:</strong> Expanding operations often requires significant upfront cash outflows before any financial benefits are realised — creates a timing gap that strains liquidity. <strong>Forecasting Uncertainty:</strong> Sudden shifts in customer behaviour make it extremely difficult to predict timing and scale of future cash flows. <strong>Inventory Risks:</strong> If material inputs arrive faster than capacity to process, inventory spikes → ties up vital cash.',
answer:'<strong>Situation:</strong> Following negative news stories about improper waste disposal, customers are suddenly returning used packaging to Cartn instead of using third-party recycling. <strong>Impact:</strong> Immediate, unpredictable spike in cash outflows (collection, sorting, processing). Significant time lag between spending and saving on raw materials → severe working capital strain. If returns flood in faster than Cartn can process, oversupply of inventory ties up even more cash. <strong>Strategy:</strong> Scale up collection gradually; prioritise highest-quality recyclable materials only. Long-term opportunity: cheaper raw materials, enhanced brand value, deeper eco-conscious client trust.'},

{mock:'P2',sec:'T6',sub:'6',topic:'Real Options',wt:0,
q:'P2-T6: Assess the real options available to Cartn if it proceeds with a 20-year supply agreement with the Corvelon Group.',
theory:'<strong>Real options — the five key types:</strong><ul><li>Delay: waiting before making full investment</li><li>Expand: scaling up if project succeeds</li><li>Switch: redeploying assets to a different use</li><li>Abandon: walking away if unprofitable</li><li>Contract: scaling down during quiet periods</li></ul>',
answer:'<strong>Deal:</strong> Massive 20-year supply agreement — fixed pricing but Corvelon can vary order quantities. <strong>Options to build in:</strong> (1) Delay — negotiate trial 5-year rollout before expanding all factories; (2) Expand — link new facility investments to confirmed, guaranteed order volumes; (3) Switch — retain contractual flexibility to alter material sourcing or reallocate production lines as packaging trends change; (4) Abandon — negotiate fair exit clause if Corvelon orders fall below profitable threshold; (5) Contract — if Corvelon temporarily reduces orders, scale down (reduce labour shifts, use warehouse for other customers).'},

{mock:'P2',sec:'T7',sub:'7',topic:'Business Model',wt:0,
q:'P2-T7: How would launching a dedicated recycling and packaging recovery service affect Cartn\'s business model?',
theory:'<strong>Business model framework:</strong> Defining Value (customer needs), Creating Value (internal processes/resources), Delivering Value (channels/logistics), Capturing Residual Value (profitability and long-term benefits).',
answer:'<strong>Defining Value:</strong> Expands from providing packaging to offering full lifecycle responsibility. Appeals to eco-conscious clients but must not replace core packaging focus. <strong>Creating Value:</strong> Must build new capabilities (material sorting, processing, recycling partnerships) — increases complexity but recovers materials for reuse in production. <strong>Delivering Value:</strong> Must introduce reverse logistics (collecting used packaging from customer sites) — requires flawless coordination between logistics, production, recycling teams. <strong>Capturing Value:</strong> Closes the loop → increases future demand from circular economy-preferring clients. But infrastructure costs must not erode profit margins.'},

{mock:'P2',sec:'T8',sub:'8',topic:'Project Risks',wt:0,
q:'P2-T8: What are the key risks of the FreshSpring Foods 5-year supply contract and how should Cartn mitigate them? (30-day bespoke delivery window + repurchase clause)',
theory:'<strong>Project risk management:</strong> Taking on complex large-scale contracts introduces operational, financial, and reputational risks. Risk mitigation requires proactive identification before signing + structured controls (buffer stocks, cross-functional teams, SLAs).',
answer:'<strong>Risks & Mitigations:</strong> (1) Supply & Timeline Risk (30-day window) → pre-approved catalogue of standard formats + buffer stock of key materials; (2) Consultancy Risk (inaccurate advice ruins client production line) → dedicated experienced cross-functional project team + strict technical checklists; (3) Financial/Logistical Risk (repurchase clause — buying back obsolete custom packaging with zero resale value) → negotiate flexible repurchase terms tied to recoverability and condition; (4) Operational Coordination Risk → robust real-time project management + milestone accountability; (5) Reputational Risk → dedicated account manager + clear SLAs covering delivery times and quality standards.'},

{mock:'P2',sec:'T9',sub:'9',topic:'Pricing',wt:0,
q:'P2-T9: Should Cartn use cost-plus, value-based, or penetration pricing for the new Eco-Line sustainable packaging range (20% higher production costs, H$0.45 extra per unit)?',
theory:'<strong>Cost-Plus:</strong> Adds standard margin to unit cost — guarantees recovery but ignores customer willingness to pay. <strong>Value-Based:</strong> Price based on perceived value and benefits to customer. <strong>Penetration:</strong> Very low price to gain market share — dangerous for premium products, destroys brand image and erodes margins.',
answer:'<strong>Cost-plus (flawed):</strong> Would recover costs but leave money on the table — fails to capitalise on how desperately food manufacturers want sustainable packaging for regulatory compliance. <strong>Penetration (flawed):</strong> Destroys margins and ruins perception that Eco-Line is premium and innovative. <strong>Value-based (recommended):</strong> Large food clients face immense pressure from consumers and regulators to be eco-friendly. Cartn charges a premium — effectively making clients pay for the reputational boost and sustainability compliance the Eco-Line provides. Supported by market benchmarking.'},

{mock:'P2',sec:'T10',sub:'10',topic:'Stress Testing',wt:0,
q:'P2-T10: How should Cartn apply stress testing to assess and mitigate operational pressures on its customer service staff (abusive callers, technical queries, contract disputes)?',
theory:'<strong>Stress testing:</strong> Simulates and measures how sustained operational pressures affect a system\'s (or team\'s) performance, motivation, and resilience. Goal: identify critical pressure points before they cause systemic failure.',
answer:'<strong>Problem:</strong> Call centre staff face mocking/aggressive callers, pressure to instantly answer technical packaging queries, disputes about out-of-scope support. <strong>Apply stress testing:</strong> (1) Aggressive behaviour → test impact on concentration → resilience training, rotation policies after difficult calls, clear escalation protocols; (2) Technical delays → measure impatience stress → faster internal reference systems, train staff to explain delays confidently; (3) Contract disputes → analyse out-of-scope demands → improve pre-contract communication, equip staff with contract-display systems; (4) Workload thresholds → model exact point where high volume damages quality → redesign shift schedules, mandatory recovery breaks, confidential wellbeing assessments.'},

{mock:'P2',sec:'T11',sub:'11',topic:'Non-Financial KPIs',wt:0,
q:'P2-T11: How can Cartn introduce non-financial performance indicators to improve collaboration between the Procurement and Quality Assurance (QA) teams?',
theory:'<strong>Problem:</strong> Isolated department-specific metrics create "siloed" behaviour — departments work against each other to hit their own targets. <strong>Solution:</strong> Non-Financial Indicators (NFIs) measure qualitative success factors (collaboration, quality alignment, speed) to align departments toward shared goals (goal congruence).',
answer:'<strong>Procurement NFIs:</strong> Quality Alignment Rate (how often sourced materials pass QA without issue), Supplier Reliability Score — shifts focus from cheapest to most reliable materials. <strong>QA NFIs:</strong> Testing Consistency Rate (reduce subjective erratic rejections), Testing Turnaround Time (prevent QA becoming a bottleneck), Communication and Collaboration Score. <strong>Joint NFIs (key fix):</strong> Material Acceptance Rate + Production Readiness Time — ties both teams\' evaluations to shared targets, forcing cooperation to get high-quality materials onto the factory floor quickly without compromising standards.'},

{mock:'P2',sec:'T12',sub:'12',topic:'Transfer Pricing',wt:0,
q:'P2-T12: Evaluate the risks of the current fixed fee arrangement between Cartn\'s Consultancy and Manufacturing teams. Recommend an alternative transfer pricing model.',
theory:'<strong>Transfer pricing:</strong> Internal price charged when one division provides goods/services to another. Well-designed system ensures goal congruence. <strong>Danger of fixed fees:</strong> Flat fee for varying levels of work creates dysfunctional behaviour — supplying division financially penalised for complex tasks → reduced motivation, rushed work, inter-departmental hostility.',
answer:'<strong>Problem:</strong> Manufacturing receives same flat internal fee whether the custom project is minor tweaks or massive production-line redesigns. Manufacturing feels under-rewarded → deliberately delays demanding projects → frustrates Consultancy → damages client deliveries. <strong>Risks:</strong> Manufacturing prioritises easy projects, compromises quality on complex ones → customer complaints → blame culture destroys synergy between divisions. <strong>Solutions:</strong> (1) Activity-Based Pricing: clear complexity tiers (simple/moderate/complex) with higher fee for demanding work; (2) Cost-Plus Marginal Fee: standard base fee + agreed marginal fee for extra materials, testing, complex scheduling.'},

{mock:'P2',sec:'T13',sub:'13',topic:'WACC',wt:0,
q:'P2-T13: Evaluate the relevance of Cartn\'s WACC as the discount rate for the H$60m South Harrland expansion facility NPV calculation.',
theory:'<strong>WACC rule:</strong> Current WACC reflects average risk of existing overall business. Only suitable for new projects if the project shares the exact same operational risk profile and financing structure. If greater uncertainty or new debt alters gearing → WACC understates true cost of capital → NPV artificially inflated.',
answer:'<strong>Business risk alignment:</strong> New facility aligns with Cartn\'s core activities (cartons/tubs + consultancy) → current WACC is a relevant starting point. <strong>Geographic risk:</strong> Current WACC reflects highly diversified global operation. Single regional facility carries concentrated local risks (unproven demand, intense regional competition, specific operational costs). <strong>Financial risk:</strong> Current gearing = 28.5%. If entire H$60m funded by new loans → gearing spikes to ~35.7% → debt and equity investors demand higher returns → current WACC understates true cost. <strong>Strategy:</strong> Use WACC as baseline benchmark only. Adjust discount rate upward to reflect concentrated local risk and increased leverage.'},

{mock:'P2',sec:'T14',sub:'14',topic:'Risk Identification',wt:0,
q:'P2-T14: Evaluate the product/service, reputational, and operational risks of Cartn moving from a fixed-price model to a bid-based (tender) pricing approach.',
theory:'<strong>Fixed-price model:</strong> Operational stability, predictable cash flows, transparent relationships — but may be uncompetitive for large clients demanding flexible contracts. <strong>Bid-based model:</strong> Increases ability to win large contracts but introduces severe volatility in profit margins, capacity planning, and brand perception.',
answer:'<strong>Product/Service Risk (margin erosion):</strong> To win bids, Cartn may set prices too low → destroys profit margins; shifts client focus from premium quality to cost-driven decisions. <strong>Reputational Risk (inconsistency):</strong> Charging different customers vastly different prices creates perception of unfairness; aggressive price cuts signal quality/reliability has dropped. <strong>Operational Risk (capacity chaos):</strong> Bid preparation under tight deadlines requires intense coordination between consultancy and manufacturing. Unpredictably winning or losing massive contracts wrecks factory planning — bottlenecks when winning, idle factories when losing. <strong>Strategy:</strong> Hybrid approach — fixed price for standard packaging, bid-based only for large customised contracts. Set strict minimum price thresholds.'},

{mock:'P2',sec:'T15',sub:'15',topic:'Balanced Scorecard',wt:0,
q:'P2-T15: Provide two KPI examples for each of the four Balanced Scorecard pillars for Cartn\'s Sales and Consultancy teams. Explain why adopting the BSC would be valuable.',
theory:'<strong>Balanced Scorecard (BSC) — 4 pillars:</strong> Financial, Customer, Internal Process, Learning & Growth. <strong>Danger of financials-only:</strong> Neglects vital long-term drivers of success — customer satisfaction, operational efficiency, continuous employee development.',
answer:'<strong>Financial:</strong> Revenue vs Target, Contribution Margin per Client (encourages profitable sales not just volume). <strong>Customer:</strong> Customer Satisfaction Index (CSI), Customer Retention Rate. <strong>Internal Process:</strong> Project Delivery Timeliness, Accuracy of Packaging Specifications (reduces errors and factory rework). <strong>Learning & Growth:</strong> Technical Skills Training participation, Contributions to Innovation/Process Improvement. <strong>Value of BSC:</strong> Provides fairer evaluation — finally recognises qualitative contributions of 800 engineers. Aligns daily behaviours of Sales and Consultancy with Cartn\'s long-term goals (quality, innovation, customer success). Drastically improves staff motivation by measuring what truly matters.'},
