{mock:'F2',sec:'T1',sub:'1',topic:'IAS 21 / Currency',wt:0,
q:'F2-T1: How will exchange rate changes between the H$ and Norland currency affect Cartn\'s reported performance after the H$7.5m Norland investment?',
theory:'<strong>IAS 21 Translation rules:</strong> Assets & Liabilities → closing rate (gains/losses to OCI/Currency Reserve, not operating profit). Income & Expenses → average rate (directly impacts reported revenue and margins). <strong>Ratio distortions if foreign currency weakens:</strong> Gearing increases (equity shrinks), ROCE & ROE artificially inflate (denominators become smaller).',
answer:'<strong>Translation risk:</strong> If Norland\'s currency weakens against H$, Cartn records translation loss (reducing group equity) and reports lower translated revenues. <strong>Ratio impact:</strong> Weaker Norland currency artificially inflates Cartn\'s Gearing, ROCE, and ROE upon consolidation. <strong>Commercial risk:</strong> Exchange rates affect local price competitiveness — Cartn must monitor to ensure its cartons remain cheaper than local Norland suppliers. This is already visible in Cartn\'s current Currency Reserve of H$-14.7m on the balance sheet.'},

{mock:'F2',sec:'T2',sub:'2',topic:'Integrated Reporting / IP',wt:0,
q:'F2-T2: Evaluate advantages and disadvantages of including AutoValue (AI pricing system) in Cartn\'s Intellectual Capital section of the Integrated Report.',
theory:'<strong>Pros of disclosing tech in IR:</strong> Proves innovation, boosts investor confidence, explains job cuts as "digital upgrade" not desperate cost-cutting. <strong>Cons:</strong> Raises expectations dangerously high, exposes trade secrets to rivals, makes tech staff targets for poachers, destroys morale by celebrating job-killing automation.',
answer:'<strong>AutoValue:</strong> Cartn\'s patented AI system that prices consultancy projects — leading to firing of human estimation staff. <strong>Why disclose:</strong> Shows investors Cartn uses advanced data to guarantee profitable pricing; frames staff cuts as smart strategy. <strong>Risks of disclosing:</strong> (1) Expectations — if AI misprices a massive project, investor trust collapses; (2) Exposure — Valboxx might copy the strategy or poach Cartn\'s data analysts; (3) Morale — praising a robot that caused employees to lose their jobs severely damages Human Capital and company culture.'},

{mock:'F2',sec:'T3',sub:'3',topic:'IFRS 16',wt:0,
q:'F2-T3: How would an 8-year lease of automated quality-testing equipment (H$1.45m equivalent purchase cost) be recognised under IFRS 16? How does it impact Cartn\'s ratios?',
theory:'<strong>IFRS 16:</strong> When a lease covers most of an asset\'s useful life, must record: Right-of-Use (ROU) Asset + Lease Liability (present value of future payments). P&L: depreciation on ROU asset + interest expense on lease liability (replaces single rent expense).',
answer:'<strong>Accounting:</strong> H$1.45m ROU asset added to non-current assets; H$1.45m lease liability split into current portion (due within 12 months) and non-current. <strong>Ratio impacts:</strong> (1) Gearing increases slightly — 28.54% to 28.73% (adding debt without adding equity); (2) ROCE decreases initially — Capital Employed spikes immediately but profit benefits haven\'t materialised yet; (3) Current Ratio decreases — adding next 12 months of lease payments to current liabilities. <strong>Shareholder view:</strong> Positive — securing advanced technology (reduces manual inspection time by 60%) without H$1.45m upfront cash drain. Minor ratio impacts are immaterial for a group of Cartn\'s size.'},

{mock:'F2',sec:'T4',sub:'4',topic:'IAS 28 / Associates',wt:0,
q:'F2-T4: How should Cartn\'s 30% investment in PackRoute Logistics (H$2.76m) be accounted for under IFRS in the consolidated financial statements?',
theory:'<strong>IAS 28 — Significant Influence:</strong> 20%–50% voting power = presumed significant influence (but not control) = Associate. <strong>Equity Method:</strong> Investment recorded at cost initially. Each year: carrying amount increases by investor\'s % share of associate\'s net profits (recognised in P&L); decreases by dividends received.',
answer:'<strong>Deal:</strong> Cartn teams with Valboxx and Tubline Packaging to invest in PackRoute Logistics — Cartn pays H$2.76m for 30% equity. <strong>Accounting:</strong> 30% > 20% threshold → significant influence → must treat as Associate using equity method. Initially record H$2.76m investment. Annually: add 30% of PackRoute\'s profits directly to Cartn\'s consolidated P&L as single line item. <strong>Impairment risk:</strong> If PackRoute underperforms, Cartn must write down (impair) the carrying value. <strong>Strategic benefit:</strong> Secures reliable delivery network and share of logistics profits without bringing full logistics liabilities onto Cartn\'s balance sheet.'},

{mock:'F2',sec:'T5',sub:'5',topic:'IAS 37 / Provisions',wt:0,
q:'F2-T5: A food manufacturer changed its packaging specs causing compatibility issues with Cartn\'s cartons (18% of orders undelivered, some customers requesting returns). What is the appropriate accounting treatment?',
theory:'<strong>IAS 37 — three-tier approach:</strong> (1) Known returns confirmed before reporting date → immediate liability; (2) Returns probable and reliably estimable → IAS 37 Provision; (3) Returns possible but too uncertain to measure → Contingent Liability (disclose in notes only).',
answer:'<strong>Accounting:</strong> (1) Reverse revenue for any sales where returns actually occur; (2) Record immediate liabilities for confirmed cancellations; (3) Create IAS 37 provision for probable future returns based on 18% undelivered volume; (4) Disclose highly uncertain future losses as contingent liability in notes. <strong>Strategy:</strong> Technical teams testing affected products to identify which can be adjusted to meet new specs. Offering replacement packaging, technical adjustments, or pricing concessions helps avoid full cancellations and maintains relationships with Cartn\'s food manufacturer clients.'},

{mock:'F2',sec:'T6',sub:'6',topic:'IFRS 15 / Ratios',wt:0,
q:'F2-T6: Cartn received a H$20m upfront deposit on a H$40m packaging order in September 2026. Packaging won\'t be delivered until February 2027. What is the accounting impact on ratios? Should Cartn disclose this in notes?',
theory:'<strong>IFRS 15 — Revenue Recognition:</strong> Revenue only recognised when performance obligation satisfied (goods actually delivered). <strong>Upfront deposits:</strong> Cannot be recorded as revenue — must be recorded as Contract Liability (deferred income) under current liabilities.',
answer:'<strong>Accounting:</strong> H$20m cannot be recognised as 2026 revenue → recorded as current liability. <strong>Ratio impacts:</strong> (1) Current Ratio distorted — both cash (assets) and contract liabilities (liabilities) increase, may make liquidity look slightly weaker; (2) Gearing technically unchanged — customer deposit is not an interest-bearing loan, though total liabilities spike; (3) Revenue understated in 2026, overstated in 2027. <strong>Disclosure (strongly recommended):</strong> Explanatory note in financial statements clarifies that H$20m "liability" is actually secured future revenue not a risky financial debt — prevents investor panic over distorted ratios.'},

{mock:'F2',sec:'T7',sub:'7',topic:'Integrated Reporting / Social Capital',wt:0,
q:'F2-T7: Cartn\'s customer surveys show strong overall satisfaction but hidden contradictions (some rated quality poorly due to delivery delays, others praised durability but criticised sustainability). How should Cartn report this in its Integrated Report?',
theory:'<strong>Social & Relationship Capital in IR:</strong> Reflects strength of relationships, trust, and long-term partnerships with key stakeholders. <strong>IR reporting principle:</strong> Requires fair, balanced, and transparent view. Presenting only positive headline figures while hiding inconsistencies or negative trends is misleading and unethical.',
answer:'If Cartn simply publishes the high overall satisfaction scores, investors and large food clients might be misled about the true state of Cartn\'s customer relationships. <strong>Required approach:</strong> In the IR, explicitly explain the contradictory feedback. Highlight that external factors (logistics disruptions from 3rd-party couriers) skewed some results — these are not reflective of Cartn\'s packaging or consultancy quality. Disclose the actions Cartn is taking to improve both the customer experience and future survey design. Transparency protects Cartn\'s credibility; hiding contradictions would destroy it if exposed.'},

{mock:'F2',sec:'T8',sub:'8',topic:'IAS 38 / Capitalisation',wt:0,
q:'F2-T8: Can Cartn capitalise the costs of creating the Client Specification Integration System (CSIS) — an AI-powered digital platform for customers to submit packaging requirements directly into production systems?',
theory:'<strong>IAS 38 — Capitalisation Criteria:</strong> Development costs can only be capitalised if: (1) Technical feasibility proven; (2) Reliable measurement of costs; (3) Probable future economic benefits. <strong>Must expense:</strong> Staff training, maintenance, operational rollout costs. <strong>Amortisation:</strong> Capitalised costs amortised over asset\'s estimated useful life.',
answer:'<strong>Capitalise:</strong> Consultant fees for system design + internal IT development hours → can be capitalised. Costs reliably measurable (invoices + timesheets). System generates future economic benefits by reducing manual errors and speeding up consultancy sales. <strong>Must expense:</strong> Pilot rollout costs and staff training costs — do not qualify as development costs under IAS 38 and must be separated and expensed immediately. <strong>Implication:</strong> Capitalising increases Cartn\'s intangible assets (currently H$142.6m) but will reduce operating profit in future years through amortisation charges.'},

{mock:'F2',sec:'T9',sub:'9',topic:'Fair Value / IFRS 3',wt:0,
q:'F2-T9: What are the challenges in determining a reliable fair value for Cartn\'s proposed 60% acquisition of PackScan (proprietary AI-driven quality inspection system combining software and custom hardware)?',
theory:'<strong>Fair Value (IFRS 13/3):</strong> Price received to sell an asset in an orderly transaction between market participants. When acquiring unlisted company with unique intangible assets, no observable active market prices → must use: Market Approach (comparables), Income Approach (discounted future cash flows/cost savings), Cost Approach (cost to recreate or replace).',
answer:'<strong>Challenges:</strong> (1) No market comparables — PackScan is bespoke, no similar systems to benchmark; (2) Uncertain future benefits — AI is currently only 85% accurate and still developing, making future cost savings highly speculative; (3) Cost vs value — historical development cost doesn\'t reflect true future economic value; (4) Hardware dependency — software only works with custom inspection rigs, impossible to value software independently from hardware. <strong>Strategy:</strong> Use combination of valuation approaches but remain highly cautious. Overvaluing this developing AI creates significant future impairment risk if system fails to improve past 85% accuracy.'},

{mock:'F2',sec:'T10',sub:'10',topic:'IAS 38 / R&D',wt:0,
q:'F2-T10: How should Cartn handle the accounting treatment of R&D costs (H$1.2m in 2026) for a programme to improve packaging sustainability (redesigning laminated structures, replacing plastic tub components with paperboard)?',
theory:'<strong>IAS 38 — Research vs Development:</strong> Research phase: all exploratory testing must be expensed immediately (no guarantee of future benefits). Development phase: can only be capitalised if company proves technical feasibility, commercial viability, intention to complete, and probable future economic benefits. If uncertain → expense. If capitalised project later fails commercially → write down (impair).',
answer:'<strong>Research (expense immediately):</strong> Early-stage experimentation with alternative materials — must be expensed as incurred. <strong>Development (capitalise):</strong> Once a specific revised carton or tub design demonstrates repeatable technical success and defined commercial use, subsequent refinement costs can be capitalised. <strong>Challenge:</strong> Cartn must implement formal monitoring system to meticulously track staff time, prototype materials, and external support costs to justify when project crosses from research to development. <strong>Disclosure:</strong> Explain to investors that expensing research costs will reduce short-term profits but is necessary to secure long-term sustainable packaging demand.'},

{mock:'F2',sec:'T11',sub:'11',topic:'IFRS 3 / NCI / Goodwill',wt:0,
q:'F2-T11: What are the challenges of accounting for goodwill and NCI in Cartn\'s proposed 60% acquisition of EcoLid Solutions (sustainable paperboard lids specialist) using the fair value method?',
theory:'<strong>IFRS 3 Goodwill:</strong> Purchase consideration + fair value of NCI − fair value of identifiable net assets. IAS 36: goodwill not amortised but tested annually for impairment. <strong>NCI (fair value method):</strong> Remaining % must be accurately valued at acquisition date — highly complex for unlisted private companies. <strong>Control premium:</strong> 60% controlling stake worth more per share than 40% minority stake.',
answer:'<strong>Goodwill challenge:</strong> EcoLid\'s true value lies in internally generated intangibles (technical reputation, specialist know-how, established customer relationships) — NOT on EcoLid\'s balance sheet. Cartn will pay significantly more than book value → massive Goodwill arises. <strong>Impairment risk:</strong> Goodwill is fragile — if EcoLid\'s key technical staff leave after buyout or Cartn fails to achieve sustainability synergies, anticipated future benefits vanish → severe impairment loss hits profits. <strong>NCI valuation challenge:</strong> EcoLid is private/unlisted → no share price to look up. Cannot simply apply Cartn\'s 60% per-share price to the 40% (Cartn\'s price includes a control premium). Must use complex DCF estimation to value the NCI fairly.'},

{mock:'F2',sec:'T12',sub:'12',topic:'ROCE',wt:0,
q:'F2-T12: How will Cartn\'s H$8m digital platform upgrade (18-month development, full deployment 2027) affect Return on Capital Employed (ROCE)?',
theory:'<strong>ROCE = Operating Profit ÷ Capital Employed.</strong> Large capital investments almost always depress ROCE short-term — capital base increases before new asset can generate matching profits. <strong>IAS 38:</strong> Costs only capitalised if technical feasibility + probable future economic benefits met. If criteria not met → expense immediately to P&L.',
answer:'<strong>Short-term ROCE impact:</strong> If costs capitalised → Capital Employed rises while profits stay stable → moderate ROCE drop. If costs expensed → Operating profit takes direct hit → much steeper, severe ROCE drop. <strong>Volatility risk:</strong> If some costs expensed while others capitalised during 18-month development → ROCE becomes highly volatile. If software goes over budget, gets delayed, or fails to deliver efficiencies → impairment loss further damages ROCE. <strong>Long-term:</strong> Once fully operational in 2027, platform reduces administrative inefficiencies and drives growth in packaging and consultancy sales → ROCE recovers and ultimately improves. Must accept short-term hit for long-term gain.'},

{mock:'F2',sec:'T13',sub:'13',topic:'IAS 38 / Intangibles',wt:0,
q:'F2-T13: Cartn is developing a supplier procurement system (H$193,900 total). Review the accounting treatment for: market research (H$2,100), software requirements analysis (H$800), software development (H$18,700), and supplier awareness campaign (H$4,300).',
theory:'<strong>IAS 38 — Capitalise if:</strong> probable future economic benefits + costs reliably measurable. <strong>Always expense:</strong> general research, market research, feasibility studies; training and promotion costs.',
answer:'<strong>Market Research H$2,100 → EXPENSE:</strong> Does not create identifiable asset — must be expensed as incurred. <strong>Software Requirements Analysis H$800 → CONDITIONAL:</strong> Capitalise only if Cartn can reliably measure time spent (timesheets) and prove it directly contributed to technical preparation. If exploratory research only → expense. <strong>Software Development H$18,700 → CAPITALISE:</strong> Development of core platform clearly meets criteria — automates purchase orders, reduces pricing inconsistencies, generates measurable long-term economic benefits. <strong>Awareness Campaign H$4,300 → EXPENSE:</strong> IAS 38 explicitly prohibits capitalising promotional or training costs — effect on future revenue cannot be reliably measured or directly attributed.'},

{mock:'F2',sec:'T14',sub:'14',topic:'Funding',wt:0,
q:'F2-T14: What are the disadvantages of Cartn using a 2-year government technology loan at 3% (vs 6.5% commercial rate) to fund a H$45m multi-year packaging rollout for the Harrland Open Education Network (HOEN)?',
theory:'<strong>Matching Principle:</strong> Repayment schedule of debt should ideally match cash inflows generated by project. Timing mismatch creates severe liquidity risk. <strong>Government loans:</strong> Attractive interest rates but rigid structures, shorter maturity periods, strict compliance requirements. <strong>Gearing:</strong> Massive new loan increases gearing ratio → restricts future borrowing and increases financial risk.',
answer:'<strong>Cash flow mismatch (biggest risk):</strong> Government loan must be fully repaid in 2 years. HOEN contract: pays only 10%–50% of cost within that timeframe + right to defer payments entirely if public funding is delayed. Creates massive cash flow gap → could push Cartn into default. <strong>Flexibility risk:</strong> HOEN project costs could vary by up to 35% (campus count not fixed). Government loans are notoriously rigid — under-borrow = funding shortfall; over-borrow = unnecessary interest cost. <strong>Operational impact:</strong> If HOEN delays payments and Cartn must service H$45m loan, may divert vital working capital away from core packaging manufacturing → disrupts raw material procurement → damages profitable core business.'},

{mock:'F2',sec:'T15',sub:'15',topic:'Goodwill / EPS',wt:0,
q:'F2-T15: Cartn is acquiring 100% of PackServe Solutions using a share exchange (increases issued shares by ~5%). PackServe has a history of operating losses. What are the challenges in determining goodwill and the impact on Cartn\'s EPS?',
theory:'<strong>Goodwill (IFRS 3/IAS 36):</strong> Purchase consideration − fair value of identifiable net assets. Valuing "soft" intangibles (customer lists, bespoke software) is highly subjective with no active market. Goodwill tested annually for impairment. <strong>EPS (IAS 33):</strong> Profit ÷ weighted average shares. Issuing new shares to acquire dilutes EPS unless acquired business instantly generates enough profit to offset increased share count.',
answer:'<strong>Goodwill challenge:</strong> PackServe\'s value lies in customer relationships and proprietary design software. History of operating losses means Cartn must value these assets very conservatively — lower valuation of net assets = higher residual Goodwill = massive future impairment risk if key staff leave or Cartn fails to turn losses around. <strong>EPS impact (dilution risk):</strong> 5% more shares issued + company with history of financial losses = group profits spread across larger share count without immediate profit boost → guaranteed short-term EPS dilution. <strong>Recovery strategy:</strong> Accept short-term EPS hit → focus aggressively on operational synergies (integrate PackServe\'s direct-to-customer consultancy with Cartn\'s massive manufacturing scale) → grow long-term EPS.'},

// ─── E2 TRIGGERS ───
{mock:'E2',sec:'T1',sub:'1',topic:'Authority / Control',wt:0,
q:'E2-T1: Evaluate the arguments for and against the assertion that Dilan Fonseka (Delivery Fleet Manager) has too much authority.',
theory:'<strong>Authority balance:</strong> Empowering managers allows quick practical decision-making and efficient resource use. However, unchecked authority creates severe financial, operational, and governance risks. <strong>Functional boundaries:</strong> Operational managers must not make commercial, financial, or legal decisions without cross-departmental oversight.',
answer:'<strong>Risks (too much authority):</strong> (1) Operational — lending out parts could leave Cartn unable to fix its own 62 electric vans → delays packaging deliveries → damages reputation; (2) Financial — bypassing Finance by setting prices and issuing invoices himself → accounting, tax, credit risks; (3) Legal — if an external van repaired by Cartn suffers a failure → negligence lawsuits. <strong>Benefits (autonomy has value):</strong> Shows strong initiative by utilising idle workshop capacity to generate extra revenue; helping local transport firms builds goodwill and community-minded brand image. <strong>Strategy:</strong> Don\'t strip all autonomy (creates bureaucratic delays). Establish clear authority limits — approve small routine external support independently; require formal Director approval + Finance visibility for major external repairs.'},

{mock:'E2',sec:'T2',sub:'2',topic:'BPR',wt:0,
q:'E2-T2: How could the principles of Business Process Re-engineering (BPR) justify and implement TechSure Systems\' automated quality testing equipment at Cartn\'s Production function?',
theory:'<strong>BPR:</strong> Radical redesign of processes to achieve dramatic improvements in performance. Key principles: redesign with technology (don\'t just automate old processes), eliminate waste (remove non-value-adding activities), staged implementation (reduce risk), people & systems alignment (train staff, upgrade IT).',
answer:'<strong>Old process (problem):</strong> Cartn shuts down multiple production lines for a massive 2-day event every 6 months to recalibrate quality-inspection workstations → wastes 120 labour hours + halts output. <strong>Innovation:</strong> Leasing TechSure\'s automated testing equipment (H$575,000 annually) — performs recalibrations directly on the floor alongside routine daily inspections. <strong>Applying BPR:</strong> (1) Redesigning with technology — stagger recalibrations workstation by workstation during quieter periods (not old 2-day shutdown); (2) Eliminating waste — removes non-value-adding downtime, improves throughput; (3) Staged implementation — lease equipment for half the sites first; (4) People & systems — upgrade IT to track staggered recalibrations, train staff for continuous-testing culture.'},

{mock:'E2',sec:'T3',sub:'3',topic:'Negotiation',wt:0,
q:'E2-T3: Identify two major difficulties in negotiating the sale of Cartn\'s packaging recycling verification equipment (AI-driven system to separate carton materials) to external recycling companies. Recommend solutions.',
theory:'<strong>Negotiation challenge 1 — IP Risk:</strong> Selling internally developed tech to third parties exposes trade secrets and creates risk of imitation. Solution: restricted licensing, software encryption, leasing models instead of outright sales. <strong>Negotiation challenge 2 — Pricing complexity:</strong> Bespoke technology lacks clear market benchmarks → difficult to agree on worth. Solution: value-based pricing (based on savings generated for buyer), flexible payment structures.',
answer:'<strong>Difficulty 1 — Protecting Cartn\'s IP:</strong> Selling machines outright means buyers/rivals could demand technical access and copy Cartn\'s advanced AI scanners and separation methods. Solution: restricted licensing/leasing model + protect AI software with encryption keys so only authorised users can operate it. <strong>Difficulty 2 — Agreeing on price:</strong> No market benchmark for this bespoke system; recycling firms have vastly different budgets and performance expectations. Solution: value-based pricing — show buyers case studies on how much money the machine saves in reduced labour and improved material recovery. For smaller firms, offer flexible instalment plans bundled with ongoing technical support.'},

{mock:'E2',sec:'T4',sub:'4',topic:'Business Model / Defining Value',wt:0,
q:'E2-T4: Cartn is considering packaging that allows fresh milk to be stored for 2 weeks without refrigeration but slightly alters the milk\'s taste. The Marketing Director argues this conflicts with Cartn\'s definition of value. Evaluate.',
theory:'<strong>Multidimensional Value:</strong> A product\'s value is not based on a single attribute (taste). It is a combination of many factors including convenience, usability, sustainability, and supply chain efficiency. <strong>Perceived quality:</strong> Value is subjective — positioning and communication directly influence how customers perceive worth.',
answer:'<strong>The concern:</strong> Advanced filtration/thermal treatment slightly alters taste, making milk seem less "fresh". Marketing Director worries this contradicts Cartn\'s core definition of value (enhancing perceived quality of customers\' food products). <strong>Why it actually enhances value (the reframe):</strong> (1) Supply Chain & Convenience — removes costly reliance on refrigerated "cold-chain" logistics, reduces spoilage for retailers, offers longer shelf life for consumers; (2) Sustainability — eliminating constant refrigeration drastically lowers energy consumption and reduces food waste; (3) Market Segmentation — not everyone prioritises premium fresh taste (households valuing convenience, institutions, regions with poor refrigeration). <strong>Conclusion:</strong> No conflict with definition of value — value drivers have simply shifted. Cartn must help clients market correctly, focusing on safety, sustainability, and convenience.'},

{mock:'E2',sec:'T5',sub:'5',topic:'Stakeholders',wt:0,
q:'E2-T5: What arguments should Cartn present to (1) the Environmental Authority, (2) manufacturing clients, and (3) the public when seeking approval for a new material-reduction process with a "Sustainably Packaged" traceable label?',
theory:'<strong>Stakeholder communication principle:</strong> Different stakeholders evaluate projects based on entirely different priorities. Regulators = compliance. Clients = profitability. Public = ethics/safety. Must craft specific persuasive arguments addressing unique concerns of each group while maintaining consistent overall message.',
answer:'<strong>Environmental Authority:</strong> Emphasise compliance and environmental impact — process drastically reduces material waste (supporting national targets), uses traceable system, maintains strict food safety and protection standards. <strong>Manufacturing Clients:</strong> Focus on commercial value and brand image — certification enhances clients\' brand reputation with eco-conscious consumers; reduction in packaging materials generates cost efficiencies in production and transportation. <strong>Public & Advocacy Groups:</strong> Prioritise transparency, environmental outcomes, and trust — traceable label guarantees genuine waste reduction; packaging remains completely safe, durable, and functional. Address any greenwashing concerns head-on with hard data.'},

{mock:'E2',sec:'T6',sub:'6',topic:'Data / Information',wt:0,
q:'E2-T6: What types of information should Cartn collect and report from a 6-week packaging assessment at a large ready-meal manufacturer\'s site to ensure the evaluation is comprehensive and on track?',
theory:'<strong>Information for project control:</strong> Management needs structured, relevant, timely information to monitor both progress (staying on schedule) and quality (meeting technical requirements). Reporting issues early allows Board to take corrective action before project derails.',
answer:'<strong>Five key information types:</strong> (1) Site Progress — which production areas visited, what processes observed (proves project advancing on schedule); (2) Functional Needs — specific packaging requirements by product line (temperature-resistant materials for frozen meals vs cost-efficient designs for bulk catering packs); (3) Operational Constraints — real-world environmental factors (storage temperatures, handling processes, transport methods that will influence final design); (4) Preliminary Recommendations — early technical ideas for materials and designs (allows Finance to evaluate cost alignment expectations); (5) Risks & Issues — any delays accessing the factory or inconsistencies in client data (ensures Board is never caught off-guard, can manage project risks proactively).'},

{mock:'E2',sec:'T7',sub:'7',topic:'Delegation',wt:0,
q:'E2-T7: Evaluate the leadership qualities demonstrated by Marketing Director Haitham Amer in delegating the technical implementation of the "Sustainably Packaged" campaign entirely to Wofai Eko\'s Product Development team.',
theory:'<strong>Effective delegation:</strong> Delegating to subject-matter experts promotes efficiency, accountability, and ownership. <strong>Delegation vs abdication:</strong> Leaders remain ultimately accountable for outcomes. Completely distancing oneself leads to disconnect between technical team\'s work and broader strategic goals. <strong>Solution:</strong> Balance of trust and active oversight — clear expectations, progress reviews, cross-functional communication without micromanaging.',
answer:'<strong>Why it\'s good leadership:</strong> Haitham shows strong self-awareness by recognising his engineering limitations and trusting specialists. Empowers technical team to ensure strict environmental compliance while freeing Haitham to focus on his actual role (market positioning and client engagement). <strong>Why it\'s risky:</strong> By stating he will leave matters "entirely" to the team, Haitham risks appearing completely disengaged. If he steps away completely, serious risk of misalignment — technical outputs might not support the specific marketing message the campaign needs to deliver. <strong>Strategy:</strong> Haitham must maintain active link between commercial and technical teams. Doesn\'t need to understand engineering details, but must establish regular progress reviews and set clear objectives to ensure final packaging design aligns with marketing goals.'},

{mock:'E2',sec:'T8',sub:'8',topic:'Employee Empowerment',wt:0,
q:'E2-T8: What challenges does Cartn face in determining the right level of authority for sustainability staff when addressing non-compliance by third-party logistics partners?',
theory:'<strong>Empowerment challenge:</strong> Too much authority = confrontational relationships that disrupt operations. Too little authority = strategic sustainability targets get ignored. Solution: balance control with collaboration through clear role definitions and structured escalation procedures.',
answer:'<strong>Limit of direct control:</strong> Sustainability staff cannot directly discipline couriers (not Cartn\'s employees) → must rely on slow formal escalation → reduces monitoring effectiveness. <strong>Strained working relationships:</strong> Too much authority → confrontational approach → damages vital logistics partnerships → delays packaging deliveries to Cartn\'s clients. <strong>Sustainability vs Speed clash:</strong> Couriers prioritise speed and volume; sustainability staff prioritise environmental targets. May not understand courier\'s real-world constraints → struggle to distinguish genuine non-compliance from unavoidable delivery pressures. <strong>Role ambiguity danger:</strong> Couriers view sustainability staff as interference; Cartn staff confused about how hard they can push → inconsistent enforcement. <strong>Strategy:</strong> Cannot give direct disciplinary control over external couriers → establish clear escalation paths, redefine authority limits, foster better communication.'},

{mock:'E2',sec:'T9',sub:'9',topic:'Project Objectives',wt:0,
q:'E2-T9: How should Cartn organise and manage the action points for launching a new range of sustainable packaging solutions by early 2027?',
theory:'<strong>Project management:</strong> Complex product launches require central project management approach. Success depends on assigning clear responsibilities, establishing timelines, and maintaining strict budget and progress monitoring.',
answer:'<strong>Cross-functional plan:</strong> (1) Project Lead — appoint central project leader (likely from Operations) to oversee entire launch and coordinate all departments; (2) Procurement — quickly engage suppliers to secure reliable, sustainable raw materials, prevent supply chain delays; (3) Operations — adapt manufacturing lines and set up new QA testing for food safety and environmental standards; (4) Marketing — build early client demand via campaigns focused on sustainability, compliance, cost efficiency; (5) Sales — comprehensive training on new technical specifications so they can confidently sell product value to clients. <strong>Controls:</strong> Detailed project timeline with clearly defined milestones (supplier agreements, marketing rollouts) backed by weekly progress reviews and strict budget controls to ensure no department falls behind schedule.'},

{mock:'E2',sec:'T10',sub:'10',topic:'Teams',wt:0,
q:'E2-T10: Cartn\'s customer feedback ratings don\'t match actual purchasing behaviour (dissatisfied clients keep buying; satisfied clients leave). Recommend the membership of a cross-functional team to investigate.',
theory:'<strong>Cross-functional teams:</strong> When a problem spans multiple departments, no single department has the full picture. Team must bring together expertise from all impacted areas. Goal: redesign feedback system and link it to actual client behaviour rather than surface-level survey scores.',
answer:'<strong>Team members:</strong> (1) Marketing (Lead) — manages communication channels, interprets customer sentiment, ensures new feedback insights align with brand positioning; (2) Sales — provides "reality check" — understand actual purchasing behaviour, explain why dissatisfied clients keep buying or satisfied clients leave; (3) Operations — cross-reference feedback against actual production and logistics data to determine if complaints link to genuine operational failures or external factors; (4) Product Development — technical insight into whether feedback relates to material performance, design flaws, or sustainability features; (5) Finance — ensures proposed solutions are financially justified by expected benefits in client retention and order volumes; (6) HR — addresses instances where feedback relates to staff interactions, creates training and development initiatives to address specific gaps.'},

{mock:'E2',sec:'T11',sub:'11',topic:'Project Lifecycle',wt:0,
q:'E2-T11: How should Cartn manage the four phases (Need, Solution, Implementation, Completion) of a project to improve the after-sales feedback process for its call centre staff?',
theory:'<strong>Project Lifecycle — 4 phases:</strong> (1) Need: identify the problem; (2) Solution: design the response; (3) Implementation: execute with controls; (4) Completion: evaluate and refine. Failing to structure through these phases leads to solutions that don\'t address root causes, face staff resistance, or fail to deliver measurable results.',
answer:'<strong>Need:</strong> Officially recognise current system fails to distinguish actual service quality from external constraints (delivery delays, packaging defects misattributed to staff). Establish core objective: produce fair, accurate, actionable performance insights. <strong>Solution:</strong> Design multi-dimensional feedback survey — separately measure service quality, response time, and product performance. Integrate with operational data (query complexity) to give fair context to each score. <strong>Implementation:</strong> Phased approach — pilot within specific product line or client segment first. Train staff and managers on how new metrics will be interpreted and used in performance reviews. <strong>Completion:</strong> Formal review by Operations, Marketing, and HR — assess whether new data accurately distinguishes staff performance from product faults. Make final refinements and establish continuous improvement process.'},

{mock:'E2',sec:'T12',sub:'12',topic:'Communication',wt:0,
q:'E2-T12: How can Cartn improve internal communication and training for staff, and enhance client-facing communication in after-sales interactions? (Context: clients frustrated by inconsistent, vague explanations of packaging specs and sustainability)',
theory:'<strong>Effective organisational communication:</strong> Clear, accurate, consistent exchange of information builds trust and manages expectations. <strong>Communication gap risk:</strong> When frontline staff lack deep product knowledge or rely on vague scripts, it creates a gap that erodes customer trust and damages professional credibility even if staff are polite and responsive.',
answer:'<strong>Four strategies:</strong> (1) Enhance internal training — move beyond basic scripts; provide continuous in-depth training on product specifications and environmental compliance; train staff to translate complex technical jargon into simple, clear language; (2) Create structured knowledge tools — reliable, easily accessible reference materials (detailed product fact sheets, concrete sustainability summaries, centralised FAQ system) for consistent, accurate answers; (3) Establish two-way feedback loop — update post-call surveys to measure communication clarity specifically; encourage staff to report recurring client questions to management so training and FAQs are continually updated; (4) Cross-functional alignment — regular meetings between Directors of Marketing, Operations, and Product Development to ensure messaging given to call centre exactly matches Cartn\'s actual technical processes and sustainability realities.'},

{mock:'E2',sec:'T13',sub:'13',topic:'Leadership Challenges',wt:0,
q:'E2-T13: What leadership challenges will Alicia Wayne face in managing an internal investigation into product classification irregularities (staff misclassifying products to inflate commission payments)?',
theory:'<strong>Leadership during crisis/investigations:</strong> Requires high degree of emotional intelligence, strict objectivity, and carefully planned communication. Leaders must uncover facts and enforce accountability while managing employee resistance, protecting confidentiality, and preventing breakdown of team morale or inter-departmental relationships.',
answer:'<strong>4 key challenges:</strong> (1) Sensitivity & Morale — adopt balanced, evidence-based approach focusing on process integrity not blaming individuals → prevents culture of fear and suspicion; (2) Managing Resistance — position investigation as collaborative review to identify system weaknesses or training gaps → reduces resistance and encourages honest participation; (3) Balancing Departmental Relationships — issue spans Sales and QA → strict neutrality required, clear communication channels focused on process improvement not finger-pointing between departments; (4) Confidentiality vs Transparency — employees need to know the issue is being taken seriously (maintains trust in incentive system fairness) but Alicia must strictly control communication, keep sensitive details restricted to prevent rumours, unnecessary conflict, and reputational risk.'},

{mock:'E2',sec:'T14',sub:'14',topic:'Project Constraints',wt:0,
q:'E2-T14: How will the project constraints of time, cost, and quality impact the completion of Cartn\'s new Zeeland distribution and inventory facility? How should these be managed?',
theory:'<strong>Project constraints (Iron Triangle):</strong> Time (schedule), Cost (budget), Quality (functionality/standards) are constantly in tension. Accelerating timeline typically increases costs or compromises quality. Reducing budget often impacts both speed and quality. Successful management requires carefully balancing all three.',
answer:'<strong>Time impact:</strong> Facility needs to be operational quickly to meet growing customer demand and improve delivery lead times. But rushing → layout errors, safety oversights, expensive rework later. <strong>Quality impact:</strong> Facility functionality directly affects Cartn\'s operational performance — poor-quality storage or unreliable IT networks → ongoing inefficiencies, safety risks, supply chain disruptions. <strong>Cost impact:</strong> Must stay within budget for financial sustainability. Trying to speed up or use higher-specification materials immediately drives up costs. <strong>Strategy:</strong> (1) Governance structure involving Finance, Operations, and Procurement; (2) Detailed cost plan from the beginning with contingency reserve for price fluctuations; (3) Regular progress reviews and structured quality assurance inspections at key stages to prevent rework; (4) Central reporting system simultaneously monitoring cost, time, and quality metrics.'},

{mock:'E2',sec:'T15',sub:'15',topic:'Conflict Management',wt:0,
q:'E2-T15: How can Cartn better manage conflicts between sales and client support staff, improve communication, and maintain morale?',
theory:'<strong>Conflict management:</strong> Conflict between departments or between staff and clients arises from resource scarcity, goal differences, role ambiguity. Resolution approaches: negotiation, mediation, clear escalation paths. Communication: clear, accurate, consistent messaging is critical for external credibility and internal morale.',
answer:'<strong>Managing conflicts:</strong> Clearly define roles and responsibilities to eliminate ambiguity about who handles what type of client issue. Introduce formal escalation paths so client support staff aren\'t expected to resolve issues beyond their authority. Use structured mediation between sales and support when they disagree on client commitments. <strong>Improving communication:</strong> Regular joint briefings between sales and support teams so client promises made by sales are known to support staff. Shared CRM system ensures both teams have access to the same client information. <strong>Maintaining morale:</strong> Recognise and reward staff who handle difficult client interactions effectively. Introduce rotation policies so high-stress roles are shared. Transparent communication from leadership about organisational changes and expectations prevents rumours and uncertainty.'},

];

let activeFilter = 'all';
function render() {
  const q = document.getElementById('srch').value.toLowerCase();
  const filtered = qs.filter(item => {
    const matchF = activeFilter === 'all' || item.mock === activeFilter;
    const matchQ = !q || [item.topic, item.q, item.theory, item.answer, item.mock].join(' ').toLowerCase().includes(q);
    return matchF && matchQ;
  });
  document.getElementById('cbar').textContent = filtered.length + ' questions shown · Tap to reveal model answer';
  const list = document.getElementById('list');
  if (!filtered.length) { list.innerHTML = '<div class="empty">No questions match. Try a different search.</div>'; return; }
  list.innerHTML = filtered.map(item => {
    const mbClass = 'mb-' + item.mock;
    const wtClass = 'wt' + item.wt;
    const mockLabel = item.mock === 'MA' ? 'CIMA A' : item.mock === 'MB' ? 'CIMA B' : item.mock === 'MC' ? 'CIMA C' : item.mock === 'PP' ? 'Past Papers' : item.mock === 'P2' ? 'P2 Trigger' : item.mock === 'F2' ? 'F2 Trigger' : item.mock === 'E2' ? 'E2 Trigger' : item.mock.replace('M','Mock ');
    return `<div class="qcard" id="qc${item.mock}${item.sec}${item.sub}${item.topic.replace(/\s/g,'')}">
      <div class="qcard-top">
        <div class="qcard-meta">
          <span class="m-badge ${mbClass}">${mockLabel}</span>
          <span class="topic-badge">${item.topic}</span>
          <span class="wt-badge ${wtClass}">${item.wt}%</span>
          ${item.sec !== 'S1' || item.sub !== '1' ? `<span class="topic-badge" style="background:#FFFFFF;color:#9A9490">${item.sec} · Sub ${item.sub}</span>` : ''}
        </div>
        <div class="sec-label">Exam question</div>
        <div class="q-text">${item.q}</div>
        <button class="reveal-btn" onclick="reveal(this)">👁 Reveal model answer</button>
      </div>
      <div class="answer-area">
        <div class="ans-section">
          <div class="ans-lbl theory">⚡ Key theory points</div>
          <div class="ans-text">${item.theory}</div>
        </div>
        <div class="sep"></div>
        <div class="ans-section">
          <div class="ans-lbl cartn">📦 Application to Cartn</div>
          <div class="ans-text">${item.answer}</div>
        </div>
        <button class="hide-btn" onclick="hide(this)">Hide answer</button>
      </div>
    </div>`;
  }).join('');
}

function reveal(btn) {
  btn.closest('.qcard').classList.add('revealed');
}
function hide(btn) {
  btn.closest('.qcard').classList.remove('revealed');
}

// Build filter pills
const fRow = document.getElementById('filters');
filters.forEach(f => {
  const btn = document.createElement('button');
  btn.className = 'pill' + (f.id === 'all' ? ' active' : '');
  btn.textContent = f.label;
  btn.onclick = () => {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = f.id;
    render();
  };
  fRow.appendChild(btn);
});

render();
</script>
