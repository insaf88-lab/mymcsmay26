<script>
const tabs = [
  {id:'all',label:'All'},

const cards = [
// ─── ACTIVITY A ───
{id:1,act:['A'],src:'Theory',icon:'💹',bg:'#EFF6FF',
title:'Capital investment appraisal methods',
theory:'NPV: Net benefit in present value — gold standard, considers TVM. Accept if positive. IRR: Rate where NPV=0 — useful for ranking. MIRR: Reinvests at cost of capital (more realistic than IRR). Payback: Time to recover investment — ignores TVM. ARR: Accounting profit % — easy but ignores cash flows. Profitability Index: NPV per $1 invested; used under capital rationing.',
cartn:'When Cartn evaluates factory expansion or new packaging tech, NPV is the primary tool. Payback matters for consultancy contracts. ARR used for Board reporting. MIRR preferred when cash flow reinvestment assumptions matter. PI used when choosing between competing capital projects across 27 factories.',
pros:['NPV: considers TVM; clear accept/reject','IRR: % return easy to communicate','MIRR: realistic reinvestment assumption'],
cons:['NPV: sensitive to discount rate','IRR: misleading for non-standard cash flows','ARR: ignores TVM and actual cash flows']},

{id:2,act:['A'],src:'Theory',icon:'📦',bg:'#EFF6FF',
title:'Relevant cashflows & investment process',
theory:'Relevant cash flow = future + incremental. Include: opportunity costs, avoidable costs, differential costs. Exclude: sunk costs, absorbed fixed overheads, committed costs, historical depreciation, notional costs. Capital Expenditure Committee: coordinates policy, appraises projects, reviews actual vs budget.',
cartn:'R&D already spent on packaging innovation = sunk cost, excluded from future appraisals. If Cartn repurposes a factory from cartons to tubs, the opportunity cost of lost carton revenue is relevant. Historical depreciation on old machinery is irrelevant when evaluating replacement.',
pros:['Focuses only on future, controllable costs','Avoids misleading results from sunk costs'],
cons:['Opportunity costs can be hard to quantify','Risk of misclassifying committed vs avoidable costs']},

{id:3,act:['A'],src:'Theory',icon:'🔮',bg:'#EFF6FF',
title:'Real options',
theory:'Option to delay/defer: wait for better market conditions. Option to switch/redeploy: change product lines. Option to expand/contract: scale up or down. Option to abandon: exit if unprofitable. Real options add flexibility and value in uncertain markets — particularly relevant when NPV is marginal.',
cartn:'Cartn could delay new tub technology if demand is uncertain. Could redeploy a carton factory to tub production if demand shifts. Option to abandon a loss-making factory provides downside protection. Past papers show this is heavily tested — apply to Cartn's long-term supply contracts too.',
pros:['Provides strategic flexibility in uncertain markets','Reduces risk of premature commitment'],
cons:['Options have a cost (not always zero)','Hard to value formally using pricing models']},

{id:4,act:['A'],src:'Theory',icon:'💲',bg:'#EFF6FF',
title:'Pricing strategies & PED',
theory:'PED = % change in QD ÷ % change in price. Elastic (>1): price cuts increase revenue. Inelastic (<1): price rises increase revenue. Strategies: cost-plus (guaranteed margin), market/value-based (captures willingness to pay), penetration (gain market share), skimming (high initial price, recover R&D). Target costing: price − margin = target cost.',
cartn:'Cartn\'s packaging is price inelastic — food manufacturers need reliable supply. Manufacturing: cost-plus for standard sizes (1L, 0.5L, 0.2L). Consultancy: priced by time and seniority — effectively value-based. Mock answers show: value-based pricing recommended for new sustainable packaging (RePurpose™, Eco-Line, BioPack). Penetration pricing for new markets.',
pros:['Cost-plus ensures cost recovery','Value-based captures willingness to pay'],
cons:['Cost-plus may under-price premium products','Elasticity difficult to estimate precisely']},

{id:5,act:['A'],src:'Theory',icon:'🌐',bg:'#EFF6FF',
title:'Business ecosystems, value chain & WACC',
theory:'Value chain: primary activities (inbound logistics, operations, outbound, marketing, service) + support (HR, procurement, tech, infrastructure). Business ecosystem: network of interconnected firms. Platform businesses: multi-sided markets. WACC: weighted average of cost of equity + after-tax cost of debt. Used as NPV discount rate. Business model: define, create, deliver, capture residual value.',
cartn:'Cartn ecosystem: raw materials → 27 factories → food manufacturers → retailers → consumers. Cartn\'s design software creates a digital platform that ties customers in. WACC uses CAPM for equity + H$154.3m loan cost. Business model: define value (excellent packaging/consultancy) → create (manufacturing expertise + R&D patents H$142.6m) → deliver (27 factories, 6 consultancy offices) → capture (repeat revenue + synergy between divisions).',
pros:['Ecosystem thinking identifies growth opportunities','Platform features increase customer switching costs'],
cons:['Ecosystem dependency creates supply chain risk','WACC hard to estimate for individual divisions']},

// ─── ACTIVITY B ───
{id:6,act:['B'],src:'Theory',icon:'📋',bg:'#F5F3FF',
title:'Project management & tools',
theory:'Project lifecycle: Initiation → Planning → Execution → Closure. Tools: Work Breakdown Structure (WBS), Critical Path Analysis (CPA), Gantt charts, resource histograms, PRINCE2. Benefits of CPA: identifies critical path, shows float on non-critical activities. Common failure reasons: poor leadership, unrealistic estimates, inadequate skills, misaligned work breakdown.',
cartn:'Cartn\'s 800 consultancy engineers manage design projects for food manufacturers. CPA critical for client production launch dates. PRINCE2 could standardise approach across all 6 global offices. Past papers heavily test: setting project objectives, managing cross-functional teams, separate vs single teams.',
pros:['Structured methodology improves reliability','CPA identifies critical path bottlenecks'],
cons:['Strict methodology creates bureaucracy','Complex projects carry uncertainty even with tools']},

{id:7,act:['B'],src:'Theory',icon:'💰',bg:'#F5F3FF',
title:'Funding: debt vs equity',
theory:'Equity: share capital, retained earnings — no obligation, dilutes ownership. Debt: loans, bonds — tax-deductible interest, creates financial risk. Gearing = debt/equity. Debt criteria: cost, timescale, liquidity, currency risk, covenants. Covenants: financial ratios, dividend restrictions, limits on further debt. Rights issues: raise equity but slower than debt.',
cartn:'Cartn has H$154.3m non-current loans. Interest cover = H$140m ÷ H$12.3m = 11.38 — very strong. Gearing = 28.5% — healthy. PPE H$258.1m available as collateral. Factory expansion likely funded by debt (manufacturing assets as security). Mock answers show debt repeatedly recommended due to strong interest cover and low current gearing.',
pros:['Debt: tax shield on interest, no dilution','Equity: no repayment obligation, safer for risky projects'],
cons:['Debt: covenants restrict future decisions','Equity: dilutes shareholders, slower to raise']},

{id:8,act:['B'],src:'Theory',icon:'🤝',bg:'#F5F3FF',
title:'Teams, motivation & groups',
theory:'Tuckman: Forming → Storming → Norming → Performing → Adjourning. Motivation: Maslow (hierarchy of needs), Herzberg (hygiene vs motivators), McGregor (Theory X/Y). Belbin team roles. Project personnel: sponsor, manager, team, steering committee. Key failure: poor leadership, scope creep, unrealistic timelines.',
cartn:'Cartn\'s 23,000 employees + 800 consultants require strong team management. When Cartn acquires a company, participative leadership retains technical experts. Mock answers show: cross-functional teams needed for major projects — include R&D (Wofai Eko), Operations (Alison Cruikshank), Finance (Mario Baquero), Marketing (Haitham Amer).',
pros:['Strong teams deliver consistent quality','Motivated engineers reduce costly turnover'],
cons:['Multinational teams face cultural/language differences','Remote norming takes longer']},

// ─── ACTIVITY C ───
{id:9,act:['C'],src:'Theory',icon:'🏢',bg:'#ECFDF5',
title:'Responsibility centres',
theory:'Cost centre: responsible for costs only. Revenue centre: responsible for revenues. Profit centre: costs + revenues. Investment centre: costs, revenues + investment decisions. Controllable cost = cost that can be influenced by budget holder. ROI and RI used in investment centres. Dysfunctional behaviour risk when uncontrollable costs are included in performance measures.',
cartn:'Cartn\'s 27 factories could be investment centres (managers control capex). Consultancy offices could be profit centres. Sustainability team (Wofai Eko) = cost centre. Mock answers: AI Hub = investment centre pros (H$84m asset, ROI accountability) vs cons (indirect benefits, dysfunctional). CreditEase Factors = cost centre challenge (KPIs needed beyond just cost-cutting).',
pros:['Profit centres incentivise revenue growth','Investment centres encourage efficient asset use'],
cons:['Cost centres don\'t incentivise revenue thinking','Uncontrollable costs cause demotivation']},

{id:10,act:['C'],src:'Theory',icon:'👔',bg:'#ECFDF5',
title:'Leadership styles & management',
theory:'Leadership styles: autocratic, democratic/participative, laissez-faire. Situational leadership (Hersey & Blanchard): adapt style to team maturity. Transformational: inspires change. Transactional: rewards/punishments. Power: legitimate, expert, referent, reward, coercive. Delegation vs abdication: delegate work, retain accountability.',
cartn:'CEO Guiquan Li leads Board with functional directors. Mock answers: participative/supportive style for consultancy projects (collaborative client solutions). Authoritative style for sustainability strategy (Wofai Eko giving direction). When Cartn acquires companies, participative leadership retains specialist engineers. Haitham Amer delegating technical work to Wofai = good but risks misalignment.',
pros:['Situational flexibility handles factory vs project contexts','Expert power critical in consultancy division'],
cons:['Global leadership challenges — cultural differences','Delegation without oversight = abdication']},

{id:11,act:['C'],src:'Theory',icon:'🔧',bg:'#ECFDF5',
title:'ABC, cost management & CGMA model',
theory:'ABC: allocates overheads based on cost drivers rather than volume. Steps: identify activities → cost drivers → rates → assign costs. ABM uses ABC to improve decisions. Target costing: market price − required profit = target cost. Cost gap closed via value analysis. CGMA cost transformation model: protect, optimise, transform. Value analysis: reduce cost while maintaining function (existing). Value engineering: during design stage.',
cartn:'Cartn manufactures standard-size cartons and tubs — ABC assigns costs more accurately. Cost drivers: machine set-up time, print complexity, quality inspection cycles. Target costing: Cartn price minus desired margin = what they can spend per carton. Mock answers: target costing challenges for new features (priority support, new sustainable packaging). Value engineering = paperboard lids replacing plastic.',
pros:['ABC gives accurate product costing for pricing','Target costing aligns design with market expectations'],
cons:['ABC is complex and costly to implement','Target costing hard when competitor prices unknown']},

{id:12,act:['C'],src:'Theory',icon:'⭐',bg:'#ECFDF5',
title:'Quality management (TQM, JIT, BPR)',
theory:'TQM: total commitment to quality throughout organisation. JIT: produce/deliver only when needed — reduces inventory. Cost of quality: conformance (prevention + appraisal) vs non-conformance (internal + external failure). BPR: radical redesign of processes for step-change improvement. Throughput accounting: maximise throughput, reduce inventory and operating expenses. Zero defects culture.',
cartn:'Food packaging quality is critical — leaking cartons cause food poisoning, recalls, reputational damage. TQM: empower 23,000 workers to halt bonding machines if polyethylene layer misaligns. JIT delivery essential — customers rely on Cartn not to disrupt production lines. Aseptic cartons (UHT milk, fruit juice) demand zero-defect quality. BPR: TechSure automated testing removes 2-day factory shutdown.',
pros:['TQM reduces external failure costs — recalls and liability','JIT reduces customers\' inventory holding costs'],
cons:['JIT creates vulnerability if supply chain disrupted','BPR causes significant disruption during implementation']},

{id:13,act:['C'],src:'Theory',icon:'♻️',bg:'#ECFDF5',
title:'Value management & lifecycle costing',
theory:'Value analysis: examines existing products to reduce cost while maintaining function. Value engineering: applied during design stage (before production). Lifecycle costing: considers all costs over a product\'s entire life — design, production, distribution, use, disposal. Esteem value: perceived quality — removing it can destroy brand perception even if customers say they don\'t care.',
cartn:'Paperboard lids replacing plastic lids on tubs = value engineering. Lifecycle costing: carton disposal/recycling costs affect Cartn\'s sustainability reputation. If Cartn removes expensive multi-colour printing from secondary packaging, esteem value to supermarkets may decline. Mock answers: lifecycle costing = key for sustainability reporting and costing new packaging materials.',
pros:['Lifecycle costing captures full sustainability costs','Value engineering reduces costs before production commitment'],
cons:['Lifecycle data can be difficult to gather','Must never compromise food safety in value analysis']},

// ─── ACTIVITY D ───
{id:14,act:['D'],src:'Theory',icon:'📈',bg:'#FFFBEB',
title:'Financial performance indicators (ROI, RI, EVA)',
theory:'ROI = EBIT ÷ Capital Employed. RI = Controllable profit − (Cost of capital × Capital employed). EVA = NOPAT − (WACC × Economic capital). ROI may discourage investment in newer assets; RI and EVA better align with shareholder value. Limitations of ROCE: based on historical book values, ignores intangibles, distorted by asset age.',
cartn:'Cartn ROI: H$140m ÷ (H$386.4m + H$154.3m) ≈ 26%. Valboxx ROI higher (H$220.2m operating profit). RI shows true return after capital charge. EVA adjustments: capitalise R&D, reverse goodwill amortisation. ROCE distorted when H$50m factory added late in year — capital employed spikes before profit benefits. Intangible assets H$142.6m = patents key to EVA.',
pros:['ROI: comparable across divisions and vs Valboxx','EVA: best aligns with long-term shareholder value'],
cons:['ROI increases with asset age — distorts replacement decisions','EVA requires complex adjustments; ROCE uses historical book values']},

{id:15,act:['D'],src:'Theory',icon:'🎯',bg:'#FFFBEB',
title:'Balanced scorecard & benchmarking',
theory:'Four perspectives: Financial (profitability, ROI), Customer (satisfaction, retention), Internal process (quality, efficiency), Learning & growth (innovation, staff). Benchmarking types: Internal (same org), Competitive (best rivals), Functional (similar function, different industry), Strategic (for strategic change). Planning and operational variances.',
cartn:'Financial: revenue growth %, gross margin %. Customer: on-time delivery rate, packaging defect rate, client satisfaction. Internal: carton seal failure rate, factory utilisation %, consultancy overruns. Learning: patents filed, training hours. Sustainability = 5th perspective: CO₂e 24.0g (down from 35.0g). Benchmarking vs Valboxx on gross margin, revenue per employee, ROCE.',
pros:['Balances short-term financial and long-term strategic goals','Benchmarking vs Valboxx gives competitive context'],
cons:['Selecting right KPIs is subjective','Competitive benchmarking data may be unavailable']},

{id:16,act:['D'],src:'Theory',icon:'⚠️',bg:'#FFFBEB',
title:'Risk management & ethics',
theory:'Risk responses: avoid, reduce, transfer, accept. Risk appetite. Sensitivity analysis, scenario planning, expected values, decision trees. CIMA code: Integrity, Objectivity, Professional competence, Confidentiality, Professional behaviour. Ethical threats: self-interest, self-review, advocacy, familiarity, intimidation. Public interest = act in best interest of society.',
cartn:'Cartn\'s risks: supply chain volatility (paperboard, aluminium, plastic prices), currency risk (H$-14.7m reserve on balance sheet), food safety failure, sustainability regulation, competitor innovation (Valboxx). Ethics: Finance Director Mario Baquero and financial managers must uphold CIMA ethics. Greenwashing accusations = major public interest risk for Cartn.',
pros:['Proactive risk management protects brand and operations','Ethics culture protects long-term reputation'],
cons:['Currency risk hard to fully hedge at global scale','Commercial pressure creates ethical tension for management']},

{id:17,act:['D'],src:'Theory',icon:'📜',bg:'#FFFBEB',
title:'Financial reporting standards (IFRS)',
theory:'IFRS 16: right-of-use assets on balance sheet — increases gearing and reduces current ratio. IAS 37: provision when probable obligation + reliable estimate. IFRS 15: 5-step revenue model — recognise over time as performance obligations met; advance payments = contract liability. IAS 38: intangibles — capitalise if technical feasibility + probable benefits + reliable cost. IAS 21: translate at closing rate (assets/liabilities), average rate (income/expenses). IFRS 3: goodwill = consideration + NCI − fair value net assets.',
cartn:'Cartn intangible assets H$142.6m = patents (IAS 38). Currency reserve H$-14.7m from translating overseas subsidiaries (IAS 21). Loans H$154.3m under IFRS 9. Consultancy revenue recognised monthly over project period (IFRS 15). Factory leases → right-of-use assets (IFRS 16). If dairy client pays upfront retainer for 3 years = deferred income (contract liability), released monthly.',
pros:['IFRS creates comparability between Cartn and Valboxx','Consistent standards across global operations'],
cons:['IFRS 16 increases reported leverage (gearing ratios)','Currency translation creates profit and loss volatility']},

{id:18,act:['D'],src:'Theory',icon:'📡',bg:'#FFFBEB',
title:'Information systems & Big Data',
theory:'Big Data: 5Vs — Volume, Velocity, Variety, Veracity, Value. Business Intelligence System (BIS): analyses large volumes of data to support decision-making. Information systems: MIS, DSS, EIS. Data security critical — packaging designs are IP. Benefits of BI: informed decisions, internal benchmarking, focus on advertising, some data sellable.',
cartn:'Cartn provides customers with software to design packaging graphics — a data-driven service. BIS could analyse factory performance data, identify quality issues, optimise scheduling across 27 factories. Mock answer: BIS used to select replacement Head of Design Engineering — analyse efficiency, management practices, manufacturing performance data, customer feedback. BI dashboards for CEO on revenue, factory utilisation, sustainability KPIs.',
pros:['Real-time BI enables faster and better decisions','Analytics can identify quality issues before they reach customers'],
cons:['Data security risk — packaging designs are valuable IP','Integration across 27 global factories is complex']},

// ─── ACTIVITY E ───
{id:19,act:['E'],src:'Theory',icon:'🌍',bg:'#FDF2F8',
title:'Group accounting (IFRS 10, IAS 28, IFRS 3, IFRS 11)',
theory:'IFRS 10: consolidate when parent has control (power + exposure to variable returns + ability to affect returns). IAS 28: equity method for associates (20–50% + significant influence). IFRS 11: joint arrangements — joint operations or joint ventures (equity method). IFRS 3: goodwill = consideration + NCI − fair value of net assets. NCI: fair value method — control premium issue for unquoted companies. Goodwill: tested annually for impairment (IAS 36), never amortised.',
cartn:'If Cartn acquires 60% of a tech company, IFRS 10 consolidation applies. If 30% stake, IAS 28 equity method. Goodwill on acquisition of unquoted company = subjective — internally generated intangibles (customer relationships, staff expertise) not on balance sheet. Cartn\'s existing intangibles H$142.6m may include acquired goodwill. NCI valuation for unquoted companies requires DCF estimation.',
pros:['Consolidated accounts give full picture of group performance','Equity method reflects economic reality of associates'],
cons:['Goodwill impairment testing is judgement-based and subjective','NCI valuation for private companies requires complex estimation']},

{id:20,act:['E'],src:'Theory',icon:'🔄',bg:'#FDF2F8',
title:'Transfer pricing',
theory:'Transfer price: charge between group divisions/subsidiaries for internal goods/services. Methods: market price (ideal), cost-plus, negotiated. Optimal: marginal cost + opportunity cost. If spare capacity: opportunity cost = 0. If busy: opportunity cost = lost external billable revenue. OECD arm\'s length principle required internationally. Dysfunctional behaviour risk with fixed flat fees.',
cartn:'Manufacturing and Consultancy divisions transact internally — transfer price needed. Mock answers: flat fee causes dysfunctional behaviour (Manufacturing delays complex projects, rushes quality). Solution: Activity-Based Transfer Pricing (complexity tiers) or Cost-Plus Marginal Fee. Internationally, with 27 countries, OECD compliance essential. Risk of tax authority challenges on profit shifting.',
pros:['Market-price transfer maximises goal congruence','Tax-efficient structure reduces group tax burden'],
cons:['Fixed flat fees cause dysfunctional behaviour','Division disputes harm cooperation']},

{id:21,act:['E'],src:'Theory',icon:'🌿',bg:'#FDF2F8',
title:'Integrated reporting & sustainability',
theory:'Integrated reporting (IR): connects financial and non-financial performance. Six capitals: Financial, Manufactured, Intellectual, Human, Social/Relationship, Natural. GRI standards: widely used for sustainability disclosures. ESG: Environmental, Social, Governance. Sustainability reporting pillars: Governance, Strategy, Risk management, Metrics.',
cartn:'Cartn\'s six capitals: Financial (H$386.4m equity), Manufactured (27 factories), Intellectual (H$142.6m patents), Human (23,000 staff + 800 consultants), Natural (aluminium/paperboard from biodiversity-supporting suppliers), Social (food safety, consumer protection). Emissions: 24.0g CO₂e per carton (down from 35.0g in 2015). Sustainability committee responsible for reporting. GRI disclosure of NCI and six capitals key for CIMA exam.',
pros:['IR demonstrates long-term value creation to investors','GRI builds stakeholder trust in sustainability claims'],
cons:['Sustainability metrics hard to compare across industry','Greenwashing accusations if claims overstated']},

{id:22,act:['E'],src:'Theory',icon:'🗣️',bg:'#FDF2F8',
title:'Communication, negotiation & conflict',
theory:'Communication barriers: language, culture, information overload. Effective: clear message, right channel, feedback loop. Negotiation: distributive (win-lose) vs integrative (win-win). BATNA: Best Alternative To a Negotiated Agreement. Stages: preparation, discussion, proposing, bargaining, closing. Conflict — Thomas-Kilmann model: competing, collaborating, compromising, avoiding, accommodating.',
cartn:'Cartn negotiates long-term packaging supply contracts — integrative builds loyalty. Consultancy requires precise communication of scope, deliverables, cost limits (cost overruns charged to client or absorbed by Cartn depending on cause). Mock answers: stakeholder-specific arguments for Environmental Authority, manufacturing clients, public. Conflict between Manufacturing and Consultancy — Board must set clear priorities.',
pros:['Integrative negotiation builds durable long-term relationships','Clear communication prevents consultancy scope creep'],
cons:['Cultural barriers in global negotiations across 27 countries','Board-level conflict delays critical strategic decisions']},

// ─── MOCK ANSWERS ───
{id:23,act:['M'],src:'Mock 1',icon:'📝',bg:'#FFF7ED',
title:'Mock 1 – All sections summary',
req:'S1.1: Leadership challenges (head of design retiring, specialised team). S1.2: How BIS used to select replacement. S2.1: AI packaging design – business model implications. S2.2: Risk of redundancy & AI. S3.1: Funding AI hub (debt vs equity). S3.2: AI hub as investment centre. S4.1: KPIs for AI design engineering. S4.2: Integrated reporting – intellectual, human, social capital.',
theory:'Leadership: authoritative (direction) + participative (collaboration). BIS: analyse efficiency data, management practices, manufacturing compatibility, customer feedback. Business model: AI helps define value faster but risks losing perceived expertise. Risk: tech reliability, human capability loss, morale drop, reputational risk with customers.',
cartn:'Debt recommended for AI hub: interest cover 11.38, gearing safe. AI hub as investment centre: pros (H$84m asset accountability, sell excess computing capacity). Cons (indirect benefits, hard to measure ROI, dysfunctional — sustainability vs ROI). KPIs: number of designs implemented, AI utilisation rate. IR: Intellectual (new AI, faster prototyping), Human (new competencies, workforce reduction plan), Social (better collaboration with clients, potential to rent computing capacity).'},

{id:24,act:['M'],src:'Mock 2',icon:'📝',bg:'#FFF7ED',
title:'Mock 2 – All sections summary',
req:'S1.1: Product, operational, contractual, reputational risks of RePurpose™. S1.2: IAS 38 actions for IP capitalisation. S2.1: Customer segmentation to predict RePurpose™ demand. S2.2: Evaluate suitability of debt to fund patent + equipment. S3.1: Leadership style for sales/consultancy project team. S3.2: Pricing strategy for RePurpose™. S3 (extra): Real options for RePurpose™ investment. S4 (extra): Negotiation approach to license RePurpose™ to rivals.',
theory:'IAS 38 criteria: identifiable, probable future benefits, technical feasibility, cost measured reliably. Customer segmentation: sustainability priorities, technical capability, organisational scale. Value-based pricing: charge premium to those under regulatory pressure to be green. Real option: maintains strategic flexibility when future is uncertain.',
cartn:'Risk: tech unproven (18 months away), greenwashing reputation risk, engineers need training, IP contract may lack clear ownership terms. Debt suitability issue: tech won\'t generate revenue for 18 months but debt needs immediate interest payments. Leadership: participative/supportive (collaborative client introduction of complex new product). Pricing: value-based (not cost-plus or penetration). Negotiation: analyse competitors, negotiate individually (not as group), define quality standards, audit royalty payments.'},

{id:25,act:['M'],src:'Mock 3',icon:'📝',bg:'#FFF7ED',
title:'Mock 3 – All sections summary',
req:'S1.1: Business model changes when supplying to events (sports clubs, community organisations). S1.2: Risks of event packaging. S2.1: Risks of granting excessive authority to sales team. S2.2: Team membership for event packaging sales. S3.1: JIT adoption for large event. S3.2: Ratios impacted by large project and JIT.',
theory:'Business model: event customers want aesthetics, convenience, affordability, delivery speed — very different from food manufacturers. JIT advantages: reduces inventory costs, flexible design changes. JIT disadvantages: high dependency on suppliers, complex logistics for fixed-date events. Ratio impacts: inventory turnover improves, gross profit margin may decline (bulk discounts).',
cartn:'Defining Value: shifts from production efficiency to aesthetic appeal, convenience and customisation. Creating Value: needs broader technical capability for new food types. Delivering Value: small, irregular orders disrupt production scheduling. Capturing Value: flexible order-by-order pricing rather than long-term contracts. Sales team risk: negotiate prices down, low-margin contracts to hit targets, impossible delivery schedules, win contract rather than price. Team: Product Development (design feasibility), Marketing (branding), Operations (delivery feasibility), Finance (commercial viability).'},

{id:26,act:['M'],src:'Mock 4',icon:'📝',bg:'#FFF7ED',
title:'Mock 4 – All sections summary',
req:'S1.1: Pricing 3-year software subscription contracts. S1.2: IFRS 15 — subscription income, advance payments. S2.1: Product, reputation, contractual inadequacy risks. S2.2: Impact of 3-year contracts on WACC. S3.1: Separate project teams vs single team. S3.2: Target costing challenges for new software benefits. S4.1: Negotiation approach with frustrated customer. S4.2: NPV difficulties for rotating-access solution.',
theory:'IFRS 15: revenue recognised progressively; advance payments = contract liability; refundable deposits = liability. WACC only changes if fundamental risk profile or capital structure materially changes. Target costing: market price − desired margin = target cost; challenge when adding unproven service features with unknown costs.',
cartn:'3-year contracts: no discount needed (guaranteed access, price certainty, reduced admin burden, 2-week trial reduces risk). IFRS 15: revenue recognised monthly over 3 years; 2-week trial period = contract only binding after trial expires. WACC unchanged: no new capital investment, no change to core risk profile. Negotiation: legally Cartn is safe; commercially should offer rotating-access compromise to protect H$20 subsidiary relationships with Navarro dairy group. NPV difficulties: admin IT costs fluctuate constantly when toggling software profiles for 20 subsidiaries.'},

{id:27,act:['M'],src:'Mock 5',icon:'📝',bg:'#FFF7ED',
title:'Mock 5 – All sections summary',
req:'S1.1: Divestment — implications for defining and capturing residual value. S1.2: Performance improving under franchisees. S2.1: Benchmarking divested integration franchises. S2.2: Pricing challenges for franchise principals. S3.1: Issues in negotiating selling prices. S3.2: ROCE limitations for negotiating prices. S4.1: Product, reputation, contractual risks. S4.2: Debt repayment characteristics using H$20m proceeds.',
theory:'Divesting: shifts from direct profit to asset-light franchise fee income. Benchmarking: dual approach (vs each other for transition, vs established network for long-term potential). ROCE limitations: historical, uses depreciated book values, ignores intangibles and future royalty obligations. Debt repayment: lowers gearing, removes fixed interest, better return than idle cash.',
cartn:'Divestment: Cartn loses direct operational insights; franchisees may outperform due to personal financial incentives. Ratchet effect: Cartn previously underpriced integration services to secure carton contracts — franchisees raising prices will shock clients. H$20m to repay debt: reduces H$154.3m loans, drops gearing from 28.5% to 25.8%, saves ~8% annually on that H$20m, avoids opportunity cost of idle cash. ROCE limitations: doesn\'t include future franchise royalties; heavily depreciated machinery inflates ROCE artificially.'},

{id:28,act:['M'],src:'CIMA Mock A',icon:'📝',bg:'#FFF7ED',
title:'CIMA Mock A – BioPack (sugarcane tubs)',
req:'S1.1: Redefine value to include end consumers (B2B2C). S1.2: Product, reputational, operational risks of BioPack. S2.1: Evaluate if R&D team acted appropriately. S2.2: IAS 38 — appropriateness of continuing to capitalise H$26m. S3.1: Marketing project planning difficulties. S3.2: IRR and hurdle rate for advertising campaign. S4.1: Pricing strategies for BioPack. S4.2: Sustainability report disclosures.',
theory:'B2B2C: even in B2B model, end consumer drives demand. If consumers reject product, B2B clients stop ordering. IAS 38: must continue to demonstrate probable future economic benefits — if market demand collapses (TV documentary), impairment review required. IRR limitations: cash flows subjective for defensive campaigns; hurdle rate must be risk-adjusted.',
cartn:'BioPack: if Harrlandian TV documentary destroys consumer demand, H$26m IAS 38 asset must be impaired (reduces operating profit from H$140m significantly). R&D team failed: massive energy consumption contradicts CO₂e 24.0g target; dismissing taste issue as subjective was reckless. Marketing project: 2-month deadline, cross-functional team (R&D + Marketing + Legal). Pricing: premium/value-based (recover machinery costs) or skimming. IR disclosures: Natural Capital (CO₂e reduction), Intellectual/Human Capital (R&D team, new expertise).'},

{id:29,act:['M'],src:'CIMA Mock B',icon:'📝',bg:'#FFF7ED',
title:'CIMA Mock B – Wheat straw trays',
req:'S1.1: Challenges predicting costs and revenues for new wheat straw tray range. S1.2: Usefulness of Pack-Up segmental analysis. S2.1: Improving Product Development team engagement. S2.2: Transfer pricing challenges — Production staff lending. S3.1: Debt vs equity for H$45m investment. S3.2: Impact on integrated reporting capitals. S4.1: Project scope — manufacturer vs consumer focus. S4.2: Pricing if consumer focus. S4.3: Product and reputation risks for both focuses.',
theory:'Pack-Up segmental: useful (proves market is lucrative), limited (historical, different cost structure from Cartn). Engagement: cross-functional matrix team; transformational leadership. Transfer price flat fee: dysfunctional (Production delays complex projects). Solution: activity-based pricing or cost-plus marginal fee.',
cartn:'Revenue cannibalization risk: new trays may simply erode existing tub sales. Pack-Up: tray revenue grew from H$35.5m (15.3%) to H$57.4m (21.8%); gross margin nearly doubled 13.7% to 26.8%. Debt for H$45m: interest cover excellent, gearing rises from 28.5% to ~34% — still healthy. PPE H$258.1m as collateral. IR capitals: Financial (new revenue stream), Manufactured (H$35m new machinery), Intellectual (wheat straw expertise/patents), Human (23,000 workers gain skills), Social (reduces secondary packaging — builds trust with consumer lobby), Natural (agricultural waste replaces fossil plastics).'},

{id:30,act:['M'],src:'CIMA Mock C',icon:'📝',bg:'#FFF7ED',
title:'CIMA Mock C – 3D-Vis acquisition',
req:'S1.1: Is 3D visualisation + client training consistent with Cartn\'s business model? S1.2: Challenges negotiating acquisition of 3D-Vis. S2.1: IFRS 3 problems determining fair value of 3D-Vis assets (goodwill). S2.2: IAS 38 problems for post-acquisition software adaptation costs. S3.1: Target costing for new 3D service. S3.2: Pricing strategy vs Valboxx (H$5,000 flat fee). S4.1: Business risks of two launch options (3-month basic vs 7-month full VR). S4.2: Disruptive technology implications.',
theory:'3D-Vis value = internally generated intangibles (AI, VR software, staff knowledge) — not on balance sheet. IFRS 3: fair value all identifiable assets including inventory at H$1.5m (not H$1.2m cost) because gift-boxing ceasing. IAS 38: software adaptation for food use — technical feasibility hard to prove until rewritten for food safety constraints. Target costing: H$5,000 − 18% margin = H$3,900 target cost vs H$5,224 expected cost → H$1,324 cost gap to close.',
cartn:'Business model consistency: 3D-Vis fits (define value through expert consultancy; create value via engineers; deliver via offices; capture via synergy — consultancy clients buy physical packaging). Negotiation challenge: Cartn can\'t value proprietary AI independently; must prevent founders starting rival firm post-acquisition. Valboxx threat: entering consultancy at cheap H$5,000 flat fee. Disruptive tech: if 3D VR becomes industry standard, Cartn\'s 2D methods and patents become obsolete — must upskill 800 engineers rapidly.'},

{id:31,act:['P'],src:'Past Papers 2023',icon:'📚',bg:'#F0FDF4',
title:'2023 May–Aug: Top 10 exam themes',
theory:'1. Business Model (consistency, adapting for new markets). 2. NPV difficulties (demand uncertainty, cost estimation, incremental impact, macro factors). 3. Financial reporting & ratios (IAS 38, IAS 37, IFRS 16 — impacts on profitability, liquidity, gearing). 4. Performance management & transfer pricing. 5. Negotiation strategy. 6. Quality management & project teams. 7. Leadership, authority & employee empowerment. 8. Pricing strategies. 9. Integrated reporting (intellectual, social capital). 10. Business risks & uncertainty (operational, reputational, contractual, product).',
cartn:'Business model: if Cartn considers cosmetics packaging — contradicts core model (food safety vs luxury aesthetics; 27 factories built for aseptic bonding). NPV: predicting adoption rates by dairy/juice clients; forecasting volatile aluminium/polyethylene costs; isolating incremental profit vs existing consultancy sales. IAS 38: R&D costs tracked by Wofai Eko\'s team capitalised once commercial viability proven — boosts short-term ROCE but lower later via amortisation. Negotiation: Cartn\'s 27-factory scale = primary leverage for guaranteed bulk orders in exchange for price discounts/sustainability compliance.',
pros:['Tests multiple syllabus areas in every section','Heavily tests Cartn application — not just theory'],
cons:['Requires knowing Cartn financials (H$140m profit, H$154.3m loans, H$258.1m PPE)','Integrated reporting questions need all 6 capitals applied to Cartn']},

{id:32,act:['P'],src:'Past Papers 2023-24',icon:'📚',bg:'#F0FDF4',
title:'2023 Nov–2024 Feb: Top themes',
theory:'1. Project management & team leadership (cross-functional, acquisitions = participative leadership). 2. Debt vs equity financing (gearing, ROCE, inventory and liquidity impacts). 3. Responsibility centres & cost management (profit centres, lifecycle costing, value analysis). 4. TQM. 5. Performance measurement & balanced scorecard (non-financial KPIs, benchmarking). 6. Risk management, stress testing & Big Data. 7. Group accounts (IFRS 10, IFRS 3, IAS 28). 8. Integrated reporting. 9. Communication, negotiation & conflict.',
cartn:'Profit centres: Cartn\'s 6 consultancy offices incentivise billable hours. Value analysis: "cost value" of aluminium layer vs "use value" (blocking light/bacteria). TQM: empower 23,000 workers to stop bonding machines if polyethylene layer misaligns. BSC: Financial (gross profit), Internal (24.0g CO₂e), Learning (training hours for 800 engineers), Customer (aseptic packs for increased shelf life). Stress test: simulate paperboard strike in Eastland; BI analyses millions of custom packaging graphics through Cartn\'s design software.',
pros:['Heavy overlap with mock answers — preparation is transferable','Accounting standards tested every sitting'],
cons:['Group accounting questions require knowing IFRS 10/3/28/11 criteria precisely','BSC requires specific Cartn KPIs — not generic examples']},

{id:33,act:['P'],src:'Past Papers 2024',icon:'📚',bg:'#F0FDF4',
title:'2024 May–Aug: Top themes',
theory:'1. Business models, ecosystems & disruptive technology. 2. Project management, team leadership & negotiation. 3. Target costing, TQM & cost management. 4. Financial reporting (IFRS 15, IAS 37, IFRS 3, IAS 38, IAS 21). 5. Investment appraisal (NPV cash flows) & financing. 6. Integrated reporting. 7. Pricing strategies, surveys & internal performance (controllability principle).',
cartn:'Disruptive tech: viral videos of leaking Cartn cartons = social media acting as disruptive tech destroying food safety reputation, driving dairy clients to Valboxx. Controllability: Alison Cruikshank should not be penalised for factory overruns due to global aluminium price spikes. Survey reliability: clients say they\'ll pay 50% more for recyclable cartons in surveys but negotiate for cheap prices in real contracts. Real option: retaining land next to factory = option to expand when juice carton demand proven.',
pros:['Controllability principle heavily tested — apply to Cartn\'s global supply chain','Pricing strategy requires knowing Cartn\'s specific competitive position vs Valboxx'],
cons:['Survey reliability question requires methodological critique','Financial reporting questions require precise IFRS criteria']},

{id:34,act:['P'],src:'Past Papers 2024-25',icon:'📚',bg:'#F0FDF4',
title:'2024 Nov–2025 Feb: Top themes',
theory:'1. Business models, pricing & real options (licensing). 2. Project management & NPV. 3. Cost management, TQM, JIT & sales inefficiencies. 4. Financial reporting (IAS 38, IFRS 15, IFRS 11, WACC impact). 5. Stakeholder management, negotiation & integrated reporting (IAS 28, IAS 24, transfer pricing). Key theme: employee empowerment risks — sales staff granting excessive discounts.',
cartn:'Licensing: Cartn licenses patented aseptic seal tech to Valboxx — new royalty revenue but loses competitive advantage. IFRS 11: Cartn + Valboxx 50/50 recycling plant = joint venture (equity method, unanimous consent required for significant decisions). IAS 24: if Cartn buys 30% of packaging machinery supplier owned by Haitham Amer\'s spouse = associate (IAS 28) + related party (IAS 24) — full disclosure of relationship and machinery purchases required. JIT: saves warehouse costs but risks halting fruit juice client factory if paperboard suppliers delayed.',
pros:['Related party disclosure question connects Cartn\'s actual Board members','IAS 24/28 combination tested specifically with named directors'],
cons:['Easy to confuse IAS 28 (equity method) with IFRS 11 (joint venture — also equity method)','Transfer pricing for human capital has low penalty for non-compete clauses']},

{id:35,act:['P'],src:'Past Papers 2025',icon:'📚',bg:'#F0FDF4',
title:'2025 May–Aug & Nov–Feb: Top themes',
theory:'2025 May–Aug: Business models for divestments/acquisitions, BIS for social media analysis, pricing ratchet effect, predicting NPV for recycling schemes, disruptive tech (AI chatbots). 2025 Nov–Feb: Business model for advisory services, per-query vs subscription pricing, bidding vs fixed, NPV cannibalization risk, real options (delay by outsourcing initially, adapt via flexible machinery), IFRS 15 (upfront fees for multi-year contracts), IFRS 3 (goodwill for unquoted companies), IFRS 11 (joint ventures, unanimous consent). TQM: zero defects, cost centres vs profit centres, conflict resolution, call centre KPIs.',
cartn:'AI chatbot = disruptive tech: slashes 24/7 costs but threatens bespoke relationships that Cartn\'s engineers hold with dairy clients. Ratchet effect: Cartn cannot easily win back dairy clients who switched to Valboxx after price rise. Conflict: Haitham Amer (Marketing wants heavy premium boxes) vs Wofai Eko (Sustainability wants lightweight packaging) — Board must set firm priority on 24.0g CO₂e target. Call centre KPIs: lost/abandoned calls (understaffing) + pre-sales advice conversion rates (queries turning into firm orders).',
pros:['AI/digital technology themes increasingly prominent — well-suited to Cartn\'s context','Conflict resolution and authority questions appear regularly'],
cons:['NPV cannibalization = subtle — easy to miss in exam','IFRS 11 joint venture unanimity rule frequently confused with IFRS 10 control']},

{id:36,act:['T'],src:'P2 Triggers',icon:'🎯',bg:'#F5F3FF',
title:'P2 Triggers: NPV, Real Options, WACC, Cash Flows',
theory:'T1 NPV (SwiftDeliver): qualitative benefits hard to quantify; logistics outside Cartn\'s core business → uncertain cash flows. T5 Cash Flows (Recycling Returns): sudden packaging returns spike cash outflows; time lag between spending and savings; production oversupply risk. T6 Real Options (Corvelon 20-year contract): Option to Delay (trial 5-year rollout), Expand (link investment to confirmed order volumes), Switch (alter material sourcing), Abandon (exit clause), Contract (scale down if orders drop). T13 WACC (South Harrland): current WACC is starting point but must adjust upward for concentrated local risk + if new debt spikes gearing from 28.5% to 35.7%.',
cartn:'SwiftDeliver: Cartn offered H$6m, SDL wants H$9m. Benefits (fewer disputes, careful handling of delicate packaging) are qualitative — nearly impossible to quantify as cash inflows. Corvelon: fixed pricing + variable demand over 20 years = massive real option need. South Harrland: H$60m facility; all debt would push gearing to ~35.7% → WACC understated without adjustment.'},

{id:37,act:['T'],src:'P2 Triggers',icon:'🎯',bg:'#F5F3FF',
title:'P2 Triggers: Responsibility Centres, Value Chain, Pricing',
theory:'T2 Cost Centre (CreditEase): cost-only measurement causes service quality cuts → ruins customer relationships. Non-financial metrics needed. Autonomy risk: CreditEase may reject credit for clients Cartn\'s sales team already vetted. T3 Value Chain (Sustainability Logistics): inbound = audit suppliers for sustainability; outbound = reverse logistics (collect used packaging). Optimise: same trip for delivery and collection, low-emission fleets. T9 Pricing (Eco-Line range): cost-plus = cost recovery but leaves money on table; penetration = destroys premium image; value-based = charge premium to clients under regulatory pressure.',
cartn:'CreditEase (80% stake, H$8.5m): must track non-financial KPIs — communication tone, invoice accuracy, collection turnaround. Eco-Line sustainable packaging: food manufacturers need green credentials urgently — value-based pricing justified. Reverse logistics for used Cartn packaging: significant operational complexity but massive long-term opportunity to secure cheaper raw materials.'},

{id:38,act:['T'],src:'P2 Triggers',icon:'🎯',bg:'#F5F3FF',
title:'P2 Triggers: Balanced Scorecard, Non-Financial KPIs, Transfer Pricing',
theory:'T11 Non-Financial KPIs (Procurement vs QA conflict): Procurement NFIs — Quality Alignment Rate, Supplier Reliability Score. QA NFIs — Testing Consistency Rate, Testing Turnaround Time. Joint NFIs — Material Acceptance Rate, Production Readiness Time (forces both teams to cooperate). T12 Transfer Pricing (Consultancy vs Manufacturing flat fee): Activity-Based Pricing (complexity tiers) OR Cost-Plus Marginal Fee (base + premium for extra effort). T15 Balanced Scorecard (Sales & Consultancy): Financial (revenue vs target, contribution margin per client), Customer (CSI, retention rate), Internal (project delivery timeliness, specification accuracy), Learning (technical skills training, innovation contributions).',
cartn:'Procurement vs QA: shared metrics force cooperation rather than blame culture. Transfer price for consultancy/manufacturing: flat fee = Manufacturing delays complex custom projects. BSC for Cartn: prevents over-reliance on financial targets alone; recognises qualitative consultancy contributions; aligns daily behaviour of 800 engineers with Cartn\'s long-term quality and innovation goals.'},

{id:39,act:['T'],src:'P2 Triggers',icon:'🎯',bg:'#F5F3FF',
title:'P2 Triggers: Business Model, CGMA, Stress Testing, Bid-Based Pricing',
theory:'T4 CGMA Cost Transformation (Middcity factory): Connecting products with profitability (track costs per product, recheck process for scrapped units), Understanding cost drivers (idle machinery, poor layout), Fostering cost-conscious culture (employee reward programme for saving energy), Generating maximum value (train staff to use new automated systems fully). T7 Business Model (Recycling Service): Define (full lifecycle responsibility), Create (sorting + processing capabilities), Deliver (reverse logistics = collect used packaging), Capture (stronger sustainability credentials + cheaper recycled materials). T10 Stress Testing (Call Centre): test exact point where high call volumes damage quality; resilience training for abusive callers; faster reference systems for technical queries. T14 Bid-Based Pricing: product risk (margin erosion), reputational risk (inconsistency), operational risk (capacity chaos when winning or losing large bids).',
cartn:'Middcity factory: idle machines + poor layout = main cost drivers. Call centre: staff penalised unfairly for technical queries and delivery delay complaints — new multi-dimensional survey needed. Bid-based pricing risk for Cartn: factory capacity chaos — idle factories when losing, bottlenecks when winning large tenders. Hybrid approach: fixed price for standard packaging; bid-based only for large customised contracts.'},

{id:40,act:['T'],src:'F2 Triggers',icon:'🎯',bg:'#F5F3FF',
title:'F2 Triggers: IAS 21, IFRS 16, IAS 28, IAS 37, IFRS 15',
theory:'T1 IAS 21 (Norland): assets/liabilities at closing rate; income/expenses at average rate. Weaker Norland currency → translation loss (OCI), lower translated revenues, inflated Gearing/ROCE/ROE. T3 IFRS 16 (8-year lease): H$1.45m ROU asset + lease liability on balance sheet. Gearing rises, ROCE decreases, current ratio decreases. T4 IAS 28 (PackRoute 30%): equity method — H$2.76m investment; 30% of PackRoute profits to Cartn P&L annually. T5 IAS 37 (Compatibility returns): provision for probable returns; contingent liability for uncertain ones; reverse revenue for confirmed cancellations. T6 IFRS 15 (H$20m deposit): deposit = contract liability; no revenue until delivery in February 2027. Distorts current ratio — needs note to financial statements explaining.',
cartn:'Norland investment H$7.5m equity: if currency weakens, Cartn records translation loss reducing group equity. IFRS 16 lease: H$1.45m ROU asset — minor ratio impact but significant for shareholders to understand. PackRoute IAS 28: H$2.76m investment; adds 30% of logistics profits to Cartn\'s P&L as single line. IFRS 15 H$20m deposit: contract liability on balance sheet; revenue only when Cartn delivers in 2027 — must disclose in notes to prevent investor panic over distorted ratios.'},

{id:41,act:['T'],src:'F2 Triggers',icon:'🎯',bg:'#F5F3FF',
title:'F2 Triggers: IAS 38, IFRS 3, Goodwill, ROCE, EPS',
theory:'T2 Intellectual Capital (AutoValue AI): pros (proves innovation, explains job cuts as upgrade). Cons (raises expectations, exposes trade secrets, destroys morale). T8 IAS 38 (CSIS software): capitalise consultant fees + IT development hours. Expense pilot rollout + staff training. T9 IFRS 13/3 Fair Value (PackScan): no market comparables; uncertain future benefits (85% accuracy); hardware dependency. T11 IFRS 3/IAS 36 (EcoLid): goodwill = internally generated intangibles (relationships, know-how); fragile — impairment risk if key staff leave. NCI valuation complex for private company (no share price; control premium issue). T12 ROCE (digital platform H$8m): capitalised = moderate ROCE drop; expensed = severe ROCE drop. T15 EPS (PackServe 5% share issue): EPS diluted immediately because acquiring loss-making company.',
cartn:'AutoValue AI at Cartn: praising a robot that caused staff job losses = severe morale and Human Capital damage. CSIS software: capitalise design + development; expense training + pilot rollout. EcoLid: goodwill fragile if their specialist paperboard lid engineers leave post-acquisition. PackServe: 5% more shares + history of financial losses = guaranteed EPS dilution. Disclose plan to recover via operational synergies.'},

{id:42,act:['T'],src:'E2 Triggers',icon:'🎯',bg:'#F5F3FF',
title:'E2 Triggers: Authority, Delegation, Empowerment, Teams',
theory:'T1 Manager Authority (Dilan Fonseka fleet manager): pros of autonomy (utilises idle capacity, generates revenue). Cons: bypasses Finance (invoicing own), operational risk (lending out parts), legal risk (negligence if external van fails). Solution: clear authority limits + escalation procedures. T7 Delegation (Haitham delegating to Wofai): good (self-awareness, empowers technical team). Risk (complete disengagement = misalignment between technical output and marketing message). T8 Employee Empowerment (courier compliance): cannot fire external couriers; confrontational approach damages logistics partnerships; authority ambiguity = inconsistent enforcement. T10 Cross-Functional Team (customer feedback): Marketing (lead), Sales (reality check), Operations (production data), Product Development (technical), Finance (cost-benefit), HR (staff interactions).',
cartn:'Dilan Fonseka: should retain autonomy for small routine repairs but require Director approval + Finance visibility for major external work. Haitham Amer: must maintain active link between marketing and technical teams — not total disengagement. Courier compliance: Cartn sustainability staff cannot directly discipline external couriers — must use structured escalation paths. Customer feedback team: Marketing leads; all 5 other functional areas needed to diagnose why satisfied clients leave and dissatisfied clients stay.'},

{id:43,act:['T'],src:'E2 Triggers',icon:'🎯',bg:'#F5F3FF',
title:'E2 Triggers: Business Model, Negotiation, Communication, Leadership',
theory:'T3 Negotiation (selling proprietary tech): IP risk (buyers copy AI scanners) — use restricted licensing/leasing not outright sale; encrypt AI software. Pricing difficulty (no market benchmark) — value-based pricing + flexible installment plans. T4 Business Model / Defining Value (extended shelf-life milk): value drivers have shifted (supply chain convenience, sustainability, segmentation) not contradicted. T5 Stakeholder arguments: Environmental Authority (compliance + environmental impact), Manufacturing Clients (brand reputation + cost efficiencies), Public (transparency, genuine waste reduction, safety). T12 Communication (call centre gap): continuous in-depth training + reliable reference materials + two-way feedback loop + cross-functional alignment. T13 Leadership (internal investigation): balanced evidence-based approach, collaborative review, strict neutrality, control confidentiality.',
cartn:'Selling AI recycling verification system: Cartn should license/lease rather than sell outright; value-based pricing showing cost savings to recycling firms; flexible installment plans for smaller buyers. Extended shelf-life milk packaging: slight taste change is outweighed by supply chain, convenience, sustainability value — Cartn reframes without abandoning its definition of value. Stakeholder arguments: Authority gets compliance + emission data; clients get brand boost + cost savings; public gets transparency + food safety assurance. Internal investigation (product classification irregularities): Alicia Wayne must be objective, collaborative, neutral, and control confidentiality strictly.'}
];

function buildTabs() {
  const wrap = document.getElementById('tabs');
  tabs.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (t.id === 'all' ? ' on' : '');
    btn.textContent = t.label;
    btn.dataset.id = t.id;
    btn.onclick = () => {
      document.querySelectorAll('.tab').forEach(b => b.className = 'tab');
      btn.className = 'tab on' + (t.id !== 'all' ? '-' + t.id : '');
      activeFilter = t.id;
      renderCards();
    };
    wrap.appendChild(btn);
  });
}

function toggle(id) {
  const el = document.getElementById('c' + id);
  el.classList.toggle('open');
}

function renderCards() {
  const q = searchTerm.toLowerCase();
  const container = document.getElementById('cards');
  const visible = cards.filter(c => {
    const matchFilter = activeFilter === 'all' || c.act.includes(activeFilter);
    const matchSearch = !q || [c.title, c.theory, c.cartn || '', c.req || ''].join(' ').toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });

  document.getElementById('cnt').textContent = visible.length + ' cards';

  if (visible.length === 0) {
    container.innerHTML = '<div class="empty-msg">No cards match your search.</div>';
    return;
  }

  const actNames = {A:'Activity A',B:'Activity B',C:'Activity C',D:'Activity D',E:'Activity E',M:'Mock',P:'Past Paper',T:'Trigger'};

  container.innerHTML = visible.map(c => {
    const tagHtml = c.act.map(a => `<span class="ctag ctag-${a}">${actNames[a] || a}</span>`).join('') +
      `<span class="ctag ctag-${c.act[0]}" style="opacity:.7">${c.src}</span>`;

    const prosHtml = c.pros ? `<div class="grid2"><div class="pro-box"><b>✓ Advantages</b>${c.pros.join('<br>')}</div><div class="con-box"><b>✗ Disadvantages</b>${c.cons.join('<br>')}</div></div>` : '';

    const reqHtml = c.req ? `<div class="req-box"><div class="req-lbl">📋 Exam requirements tested</div>${c.req}</div>` : '';

    return `<div class="card" id="c${c.id}">
      <div class="card-hdr" onclick="toggle(${c.id})">
        <div class="card-icon" style="background:${c.bg}">${c.icon}</div>
        <div class="card-meta">
          <div class="card-title">${c.title}</div>
          <div class="card-tags">${tagHtml}</div>
        </div>
        <svg class="chev" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 5l5 5-5 5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="card-body">
        ${reqHtml}
        <div class="lbl">Theory summary</div>
        <div class="txt">${c.theory}</div>
        ${prosHtml}
        ${c.cartn ? `<div class="cartn-box"><div class="cartn-lbl">📦 Application to Cartn</div>${c.cartn}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function doSearch() {
  searchTerm = document.getElementById('srch').value;
  renderCards();
}

buildTabs();
renderCards();
</script>
</body>
</html>
